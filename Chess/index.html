<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Chess</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1e1e1e;
            color: #eee;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        
        h1 { margin-bottom: 10px; }
        
        .game-container {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        #board {
            display: grid;
            grid-template-columns: repeat(8, 48px);
            grid-template-rows: repeat(8, 48px);
            border: 6px solid #4a2c0f;
            background: #4a2c0f;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }
        
        .square {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            position: relative;
        }
        
        .light { background: #f0d9b5; }
        .dark { background: #b58863; }
        
        .highlight { box-shadow: inset 0 0 0 4px rgba(255, 255, 0, 0.7); }
        .selected { box-shadow: inset 0 0 0 4px #00ff00; }
        
        .possible::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            background: rgba(0, 255, 0, 0.45);
            border-radius: 50%;
        }
        
        .capture::after {
            content: '';
            position: absolute;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 0, 0, 0.7);
            border-radius: 50%;
        }

        .square img {
            width: 38px;
            height: 38px;
            pointer-events: none;
        }
        
        .info {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 10px;
            width: 240px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }
        
        .status {
            font-size: 1.3em;
            margin-bottom: 15px;
            text-align: center;
        }
        
        button {
            padding: 10px 20px;
            font-size: 1em;
            background: #4a2c0f;
            color: #eee;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
        }
        
        .captured {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 12px;
        }
        
        .captured img {
            width: 28px;
            height: 28px;
        }
        
        .move-history {
            max-height: 280px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.95em;
        }
    </style>
</head>
<body>
    <h1>♟️ Local Chess ♟️</h1>
    <div class="game-container">
        <div id="board"></div>
        
        <div class="info">
            <div id="status" class="status">White's turn</div>
            
            <div>
                <strong>Move History</strong>
                <div id="move-history" class="move-history"></div>
            </div>
            
            <div style="margin-top: 20px;">
                <strong>Captured by White</strong>
                <div id="captured-white" class="captured"></div>
            </div>
            
            <div style="margin-top: 15px;">
                <strong>Captured by Black</strong>
                <div id="captured-black" class="captured"></div>
            </div>
            
            <button onclick="resetGame()">New Game</button>
        </div>
    </div>

    <script>
        // Board state
        let board = [
            ['r', 'n', 'b', 'q', 'k', 'b', 'n', 'r'],
            ['p', 'p', 'p', 'p', 'p', 'p', 'p', 'p'],
            [null, null, null, null, null, null, null, null],
            [null, null, null, null, null, null, null, null],
            [null, null, null, null, null, null, null, null],
            [null, null, null, null, null, null, null, null],
            ['P', 'P', 'P', 'P', 'P', 'P', 'P', 'P'],
            ['R', 'N', 'B', 'Q', 'K', 'B', 'N', 'R']
        ];

        let currentTurn = 'white';
        let selectedPiece = null;
        let moveHistory = [];
        let capturedWhite = [];
        let capturedBlack = [];

        const files = 'abcdefgh';

        // Get image path
        function getPieceImage(piece) {
            const color = piece === piece.toUpperCase() ? 'White' : 'Black';
            const nameMap = {
                'p': 'pawn',
                'r': 'rook',
                'n': 'knight',
                'b': 'bishop',
                'q': 'queen',
                'k': 'king'
            };
            const name = nameMap[piece.toLowerCase()];
            return `data/Pieces-${color}/${name}.png`;
        }

        function createBoard() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            
            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    const square = document.createElement('div');
                    square.classList.add('square');
                    square.dataset.row = row;
                    square.dataset.col = col;
                    
                    if ((row + col) % 2 === 0) square.classList.add('light');
                    else square.classList.add('dark');
                    
                    const piece = board[row][col];
                    if (piece) {
                        const img = document.createElement('img');
                        img.src = getPieceImage(piece);
                        img.alt = piece;
                        square.appendChild(img);
                    }
                    
                    square.addEventListener('click', handleSquareClick);
                    boardEl.appendChild(square);
                }
            }
        }

        function handleSquareClick(e) {
            const row = parseInt(e.currentTarget.dataset.row);
            const col = parseInt(e.currentTarget.dataset.col);
            const piece = board[row][col];
            
            if (selectedPiece) {
                const [selRow, selCol] = selectedPiece;
                
                if (selRow === row && selCol === col) {
                    clearHighlights();
                    selectedPiece = null;
                    return;
                }
                
                if (isValidMove(selRow, selCol, row, col)) {
                    makeMove(selRow, selCol, row, col);
                } else if (piece && isSameColor(board[selRow][selCol], piece)) {
                    clearHighlights();
                    selectPiece(row, col);
                } else {
                    clearHighlights();
                    selectedPiece = null;
                }
            } else if (piece) {
                const isWhitePiece = piece === piece.toUpperCase();
                if ((currentTurn === 'white' && isWhitePiece) || 
                    (currentTurn === 'black' && !isWhitePiece)) {
                    selectPiece(row, col);
                }
            }
        }

        function selectPiece(row, col) {
            selectedPiece = [row, col];
            clearHighlights();
            getSquareElement(row, col).classList.add('selected');
            showPossibleMoves(row, col);
        }

        function getSquareElement(row, col) {
            return document.querySelector(`.square[data-row="${row}"][data-col="${col}"]`);
        }

        function clearHighlights() {
            document.querySelectorAll('.square').forEach(s => {
                s.classList.remove('highlight', 'selected', 'possible', 'capture');
            });
        }

        function showPossibleMoves(row, col) {
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    if (isValidMove(row, col, r, c)) {
                        const square = getSquareElement(r, c);
                        square.classList.add('highlight');
                        if (board[r][c]) square.classList.add('capture');
                        else square.classList.add('possible');
                    }
                }
            }
        }

        function isSameColor(p1, p2) {
            return (p1 === p1.toUpperCase()) === (p2 === p2.toUpperCase());
        }

        function isValidMove(fromRow, fromCol, toRow, toCol) {
            if (fromRow === toRow && fromCol === toCol) return false;
            const piece = board[fromRow][fromCol];
            if (!piece) return false;
            const target = board[toRow][toCol];
            if (target && isSameColor(piece, target)) return false;

            const type = piece.toLowerCase();
            const isWhite = piece === piece.toUpperCase();

            switch (type) {
                case 'p': return validatePawn(fromRow, fromCol, toRow, toCol, isWhite);
                case 'r': return validateRook(fromRow, fromCol, toRow, toCol);
                case 'n': return validateKnight(fromRow, fromCol, toRow, toCol);
                case 'b': return validateBishop(fromRow, fromCol, toRow, toCol);
                case 'q': return validateQueen(fromRow, fromCol, toRow, toCol);
                case 'k': return validateKing(fromRow, fromCol, toRow, toCol);
                default: return false;
            }
        }

        function validatePawn(fr, fc, tr, tc, isWhite) {
            const dir = isWhite ? -1 : 1;
            const start = isWhite ? 6 : 1;
            if (fc === tc) {
                if (tr === fr + dir && !board[tr][tc]) return true;
                if (fr === start && tr === fr + 2*dir && !board[tr][tc] && !board[fr+dir][tc]) return true;
            }
            if (Math.abs(fc - tc) === 1 && tr === fr + dir && board[tr][tc]) return true;
            return false;
        }

        function validateRook(fr, fc, tr, tc) {
            if (fr !== tr && fc !== tc) return false;
            return isPathClear(fr, fc, tr, tc);
        }

        function validateKnight(fr, fc, tr, tc) {
            const rd = Math.abs(fr - tr);
            const cd = Math.abs(fc - tc);
            return (rd === 2 && cd === 1) || (rd === 1 && cd === 2);
        }

        function validateBishop(fr, fc, tr, tc) {
            if (Math.abs(fr - tr) !== Math.abs(fc - tc)) return false;
            return isPathClear(fr, fc, tr, tc);
        }

        function validateQueen(fr, fc, tr, tc) {
            return validateRook(fr, fc, tr, tc) || validateBishop(fr, fc, tr, tc);
        }

        function validateKing(fr, fc, tr, tc) {
            return Math.abs(fr - tr) <= 1 && Math.abs(fc - tc) <= 1;
        }

        function isPathClear(fr, fc, tr, tc) {
            const rs = Math.sign(tr - fr);
            const cs = Math.sign(tc - fc);
            let r = fr + rs;
            let c = fc + cs;
            while (r !== tr || c !== tc) {
                if (board[r][c]) return false;
                r += rs;
                c += cs;
            }
            return true;
        }

        function makeMove(fr, fc, tr, tc) {
            const piece = board[fr][fc];
            const captured = board[tr][tc];

            const notation = getMoveNotation(fr, fc, tr, tc, piece, captured);
            moveHistory.push(notation);
            updateMoveHistory();

            if (captured) {
                if (piece === piece.toUpperCase()) {
                    capturedBlack.push(captured);
                    updateCaptured('black');
                } else {
                    capturedWhite.push(captured);
                    updateCaptured('white');
                }
            }

            board[tr][tc] = piece;
            board[fr][fc] = null;

            // Pawn promotion (to Queen)
            if (piece === 'P' && tr === 0) board[tr][tc] = 'Q';
            if (piece === 'p' && tr === 7) board[tr][tc] = 'q';

            createBoard();
            currentTurn = currentTurn === 'white' ? 'black' : 'white';
            document.getElementById('status').textContent = `${currentTurn.charAt(0).toUpperCase() + currentTurn.slice(1)}'s turn`;
            
            selectedPiece = null;
            clearHighlights();
        }

        function getMoveNotation(fr, fc, tr, tc, piece, captured) {
            const fromFile = files[fc];
            const toFile = files[tc];
            const toRank = 8 - tr;
            let n = '';
            if (piece.toLowerCase() !== 'p') n += piece.toUpperCase();
            if (captured) {
                if (piece.toLowerCase() === 'p') n += fromFile;
                n += 'x';
            }
            n += toFile + toRank;
            return n;
        }

        function updateMoveHistory() {
            const el = document.getElementById('move-history');
            let html = '';
            for (let i = 0; i < moveHistory.length; i += 2) {
                html += `<div>${Math.floor(i/2)+1}. ${moveHistory[i] || ''} ${moveHistory[i+1] || ''}</div>`;
            }
            el.innerHTML = html;
        }

        function updateCaptured(color) {
            const el = document.getElementById(`captured-${color}`);
            const list = color === 'white' ? capturedWhite : capturedBlack;
            
            el.innerHTML = list.map(p => {
                const img = document.createElement('img');
                img.src = getPieceImage(p);
                return img.outerHTML;
            }).join('');
        }

        function resetGame() {
            board = [
                ['r','n','b','q','k','b','n','r'],
                ['p','p','p','p','p','p','p','p'],
                [null,null,null,null,null,null,null,null],
                [null,null,null,null,null,null,null,null],
                [null,null,null,null,null,null,null,null],
                [null,null,null,null,null,null,null,null],
                ['P','P','P','P','P','P','P','P'],
                ['R','N','B','Q','K','B','N','R']
            ];
            currentTurn = 'white';
            selectedPiece = null;
            moveHistory = [];
            capturedWhite = [];
            capturedBlack = [];
            
            document.getElementById('status').textContent = "White's turn";
            document.getElementById('move-history').innerHTML = '';
            document.getElementById('captured-white').innerHTML = '';
            document.getElementById('captured-black').innerHTML = '';
            
            createBoard();
        }

        window.onload = createBoard;
    </script>
</body>
</html>
