<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Chess</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1e1e1e;
            color: #eee;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        
        h1 { margin-bottom: 10px; }
        
        .game-container {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        #board {
            display: grid;
            grid-template-columns: repeat(8, 48px);
            grid-template-rows: repeat(8, 48px);
            border: 6px solid #4a2c0f;
            background: #4a2c0f;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }
        
        .square {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            position: relative;
        }
        
        .light { background: #f0d9b5; }
        .dark { background: #b58863; }
        
        .highlight { box-shadow: inset 0 0 0 4px rgba(255, 255, 0, 0.7); }
        .selected { box-shadow: inset 0 0 0 4px #00ff00; }
        
        .possible::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            background: rgba(0, 255, 0, 0.45);
            border-radius: 50%;
        }
        
        .capture::after {
            content: '';
            position: absolute;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 0, 0, 0.7);
            border-radius: 50%;
        }

        .square img {
            width: 38px;
            height: 38px;
            pointer-events: none;
        }
        
        .info {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 10px;
            width: 260px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }
        
        .status {
            font-size: 1.3em;
            margin-bottom: 15px;
            text-align: center;
            font-weight: bold;
        }
        
        button {
            padding: 10px 20px;
            font-size: 1em;
            background: #4a2c0f;
            color: #eee;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
        }
        
        .captured {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 12px;
        }
        
        .captured img {
            width: 28px;
            height: 28px;
        }
        
        .move-history {
            max-height: 260px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <h1>♟️ Local Chess ♟️</h1>
    <div class="game-container">
        <div id="board"></div>
        
        <div class="info">
            <div id="status" class="status">White's turn</div>
            
            <div>
                <strong>Move History</strong>
                <div id="move-history" class="move-history"></div>
            </div>
            
            <div style="margin-top: 20px;">
                <strong>Captured by White</strong>
                <div id="captured-white" class="captured"></div>
            </div>
            
            <div style="margin-top: 15px;">
                <strong>Captured by Black</strong>
                <div id="captured-black" class="captured"></div>
            </div>
            
            <button onclick="resetGame()">New Game</button>
        </div>
    </div>

    <script>
        let board = [
            ['r','n','b','q','k','b','n','r'],
            ['p','p','p','p','p','p','p','p'],
            [null,null,null,null,null,null,null,null],
            [null,null,null,null,null,null,null,null],
            [null,null,null,null,null,null,null,null],
            [null,null,null,null,null,null,null,null],
            ['P','P','P','P','P','P','P','P'],
            ['R','N','B','Q','K','B','N','R']
        ];

        let currentTurn = 'white';
        let selectedPiece = null;
        let moveHistory = [];
        let capturedWhite = [];
        let capturedBlack = [];

        // Castling rights
        let castlingRights = {
            whiteKingSide: true,
            whiteQueenSide: true,
            blackKingSide: true,
            blackQueenSide: true
        };

        let kingPositions = { white: [7,4], black: [0,4] };

        const files = 'abcdefgh';

        function getPieceImage(piece) {
            const color = piece === piece.toUpperCase() ? 'White' : 'Black';
            const nameMap = { 'p':'pawn', 'r':'rook', 'n':'knight', 'b':'bishop', 'q':'queen', 'k':'king' };
            const name = nameMap[piece.toLowerCase()];
            return `data/Pieces-${color}/${name}.png`;
        }

        function createBoard() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            
            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    const square = document.createElement('div');
                    square.classList.add('square');
                    square.dataset.row = row;
                    square.dataset.col = col;
                    
                    if ((row + col) % 2 === 0) square.classList.add('light');
                    else square.classList.add('dark');
                    
                    const piece = board[row][col];
                    if (piece) {
                        const img = document.createElement('img');
                        img.src = getPieceImage(piece);
                        square.appendChild(img);
                    }
                    
                    square.addEventListener('click', handleSquareClick);
                    boardEl.appendChild(square);
                }
            }
        }

        function handleSquareClick(e) {
            const row = parseInt(e.currentTarget.dataset.row);
            const col = parseInt(e.currentTarget.dataset.col);
            const piece = board[row][col];
            
            if (selectedPiece) {
                const [fr, fc] = selectedPiece;
                if (fr === row && fc === col) {
                    clearHighlights();
                    selectedPiece = null;
                    return;
                }
                
                if (isValidMove(fr, fc, row, col)) {
                    makeMove(fr, fc, row, col);
                } else if (piece && isSameColor(board[fr][fc], piece)) {
                    clearHighlights();
                    selectPiece(row, col);
                } else {
                    clearHighlights();
                    selectedPiece = null;
                }
            } else if (piece) {
                const isWhite = piece === piece.toUpperCase();
                if ((currentTurn === 'white' && isWhite) || (currentTurn === 'black' && !isWhite)) {
                    selectPiece(row, col);
                }
            }
        }

        function selectPiece(row, col) {
            selectedPiece = [row, col];
            clearHighlights();
            getSquareElement(row, col).classList.add('selected');
            showPossibleMoves(row, col);
        }

        function getSquareElement(row, col) {
            return document.querySelector(`.square[data-row="${row}"][data-col="${col}"]`);
        }

        function clearHighlights() {
            document.querySelectorAll('.square').forEach(s => s.classList.remove('highlight','selected','possible','capture'));
        }

        function showPossibleMoves(row, col) {
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    if (isValidMove(row, col, r, c)) {
                        const sq = getSquareElement(r, c);
                        sq.classList.add('highlight');
                        if (board[r][c]) sq.classList.add('capture');
                        else sq.classList.add('possible');
                    }
                }
            }
        }

        function isSameColor(p1, p2) {
            return (p1 === p1.toUpperCase()) === (p2 === p2.toUpperCase());
        }

        function isValidMove(fr, fc, tr, tc) {
            if (fr === tr && fc === tc) return false;
            const piece = board[fr][fc];
            if (!piece) return false;
            if (board[tr][tc] && isSameColor(piece, board[tr][tc])) return false;

            // Special castling
            if (piece.toLowerCase() === 'k' && Math.abs(fc - tc) === 2) {
                return isValidCastling(fr, fc, tr, tc);
            }

            const type = piece.toLowerCase();
            let valid = false;

            switch (type) {
                case 'p': valid = validatePawn(fr, fc, tr, tc, piece === 'P'); break;
                case 'r': valid = validateRook(fr, fc, tr, tc); break;
                case 'n': valid = validateKnight(fr, fc, tr, tc); break;
                case 'b': valid = validateBishop(fr, fc, tr, tc); break;
                case 'q': valid = validateQueen(fr, fc, tr, tc); break;
                case 'k': valid = validateKing(fr, fc, tr, tc); break;
            }

            if (!valid) return false;

            // Simulate move and check if king is safe
            return !wouldBeInCheckAfterMove(fr, fc, tr, tc);
        }

        function isValidCastling(kingRow, kingCol, targetRow, targetCol) {
            if (kingRow !== targetRow) return false;
            const isWhite = kingRow === 7;
            const isKingSide = targetCol > kingCol;

            if (isWhite) {
                if (isKingSide && !castlingRights.whiteKingSide) return false;
                if (!isKingSide && !castlingRights.whiteQueenSide) return false;
            } else {
                if (isKingSide && !castlingRights.blackKingSide) return false;
                if (!isKingSide && !castlingRights.blackQueenSide) return false;
            }

            const rookCol = isKingSide ? 7 : 0;
            const rook = board[kingRow][rookCol];
            if (!rook || rook.toLowerCase() !== 'r') return false;

            // Check path is clear
            const step = isKingSide ? 1 : -1;
            for (let c = kingCol + step; c !== rookCol; c += step) {
                if (board[kingRow][c]) return false;
            }

            // King cannot be in check or pass through check
            if (isKingInCheck(isWhite ? 'white' : 'black')) return false;
            if (wouldBeInCheckAfterMove(kingRow, kingCol, kingRow, kingCol + step)) return false;

            return true;
        }

        function makeMove(fr, fc, tr, tc) {
            const piece = board[fr][fc];
            const captured = board[tr][tc];
            const isWhite = piece === piece.toUpperCase();

            // Handle castling
            if (piece.toLowerCase() === 'k' && Math.abs(fc - tc) === 2) {
                const isKingSide = tc > fc;
                const rookFrom = isKingSide ? 7 : 0;
                const rookTo = isKingSide ? tc - 1 : tc + 1;
                
                board[tr][rookTo] = board[tr][rookFrom];
                board[tr][rookFrom] = null;
            }

            // Update king position
            if (piece.toLowerCase() === 'k') {
                kingPositions[isWhite ? 'white' : 'black'] = [tr, tc];
            }

            // Update castling rights
            if (piece.toLowerCase() === 'k') {
                if (isWhite) {
                    castlingRights.whiteKingSide = false;
                    castlingRights.whiteQueenSide = false;
                } else {
                    castlingRights.blackKingSide = false;
                    castlingRights.blackQueenSide = false;
                }
            }
            if (piece.toLowerCase() === 'r') {
                if (fr === 7 && fc === 0) castlingRights.whiteQueenSide = false;
                if (fr === 7 && fc === 7) castlingRights.whiteKingSide = false;
                if (fr === 0 && fc === 0) castlingRights.blackQueenSide = false;
                if (fr === 0 && fc === 7) castlingRights.blackKingSide = false;
            }

            // Capture
            if (captured) {
                if (isWhite) capturedBlack.push(captured);
                else capturedWhite.push(captured);
                updateCaptured();
            }

            board[tr][tc] = piece;
            board[fr][fc] = null;

            // Pawn promotion
            if (piece === 'P' && tr === 0) board[tr][tc] = 'Q';
            if (piece === 'p' && tr === 7) board[tr][tc] = 'q';

            const notation = getMoveNotation(fr, fc, tr, tc, piece, captured);
            moveHistory.push(notation);
            updateMoveHistory();

            createBoard();

            currentTurn = currentTurn === 'white' ? 'black' : 'white';
            
            const statusEl = document.getElementById('status');
            if (isCheckmate(currentTurn)) {
                statusEl.textContent = `${currentTurn === 'white' ? 'Black' : 'White'} wins by checkmate!`;
                statusEl.style.color = '#ff4444';
            } else if (isKingInCheck(currentTurn)) {
                statusEl.textContent = `${currentTurn.charAt(0).toUpperCase() + currentTurn.slice(1)} is in check!`;
            } else {
                statusEl.textContent = `${currentTurn.charAt(0).toUpperCase() + currentTurn.slice(1)}'s turn`;
                statusEl.style.color = '';
            }

            selectedPiece = null;
            clearHighlights();
        }

        // ... (All validation functions remain the same as previous version - validatePawn, Rook, etc.)

        function wouldBeInCheckAfterMove(fr, fc, tr, tc) {
            const backupPiece = board[tr][tc];
            const movingPiece = board[fr][fc];
            
            board[tr][tc] = movingPiece;
            board[fr][fc] = null;
            
            const inCheck = isKingInCheck(movingPiece === movingPiece.toUpperCase() ? 'white' : 'black');
            
            board[fr][fc] = movingPiece;
            board[tr][tc] = backupPiece;
            
            return inCheck;
        }

        function isKingInCheck(color) {
            const kingPos = kingPositions[color];
            const opponentColor = color === 'white' ? 'black' : 'white';
            
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const piece = board[r][c];
                    if (piece && (piece === piece.toUpperCase()) !== (color === 'white')) {
                        if (isValidAttack(r, c, kingPos[0], kingPos[1])) {
                            return true;
                        }
                    }
                }
            }
            return false;
        }

        function isValidAttack(fr, fc, tr, tc) {
            const piece = board[fr][fc].toLowerCase();
            switch (piece) {
                case 'p': return validatePawnAttack(fr, fc, tr, tc, board[fr][fc] === 'P');
                case 'r': return validateRook(fr, fc, tr, tc);
                case 'n': return validateKnight(fr, fc, tr, tc);
                case 'b': return validateBishop(fr, fc, tr, tc);
                case 'q': return validateQueen(fr, fc, tr, tc);
                case 'k': return validateKing(fr, fc, tr, tc);
            }
            return false;
        }

        function validatePawnAttack(fr, fc, tr, tc, isWhite) {
            const dir = isWhite ? -1 : 1;
            return Math.abs(fc - tc) === 1 && tr === fr + dir;
        }

        function isCheckmate(color) {
            if (!isKingInCheck(color)) return false;
            
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const piece = board[r][c];
                    if (piece && (piece === piece.toUpperCase()) === (color === 'white')) {
                        for (let tr = 0; tr < 8; tr++) {
                            for (let tc = 0; tc < 8; tc++) {
                                if (isValidMove(r, c, tr, tc)) {
                                    return false;
                                }
                            }
                        }
                    }
                }
            }
            return true;
        }

        // Keep the rest of your previous functions (validatePawn, Rook, etc., updateCaptured, etc.)
        // For brevity, I'm assuming you still have them from the last version.

        function resetGame() {
            board = [ /* same initial board */ ];
            currentTurn = 'white';
            selectedPiece = null;
            moveHistory = [];
            capturedWhite = [];
            capturedBlack = [];
            castlingRights = { whiteKingSide: true, whiteQueenSide: true, blackKingSide: true, blackQueenSide: true };
            kingPositions = { white: [7,4], black: [0,4] };
            
            document.getElementById('status').textContent = "White's turn";
            document.getElementById('status').style.color = '';
            document.getElementById('move-history').innerHTML = '';
            document.getElementById('captured-white').innerHTML = '';
            document.getElementById('captured-black').innerHTML = '';
            
            createBoard();
        }

        window.onload = createBoard;
    </script>
</body>
</html>
