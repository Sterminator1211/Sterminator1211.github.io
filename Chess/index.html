<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Chess</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1e1e1e;
            color: #eee;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        
        h1 {
            margin-bottom: 10px;
        }
        
        .game-container {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        #board {
            display: grid;
            grid-template-columns: repeat(8, 60px);
            grid-template-rows: repeat(8, 60px);
            border: 8px solid #4a2c0f;
            background: #4a2c0f;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }
        
        .square {
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            cursor: pointer;
            user-select: none;
            position: relative;
        }
        
        .light { background: #f0d9b5; }
        .dark { background: #b58863; }
        
        .highlight {
            box-shadow: inset 0 0 0 5px rgba(255, 255, 0, 0.6);
        }
        
        .possible {
            position: relative;
        }
        
        .possible::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: rgba(0, 255, 0, 0.4);
            border-radius: 50%;
            z-index: 1;
        }
        
        .capture::after {
            content: '';
            position: absolute;
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 0, 0, 0.6);
            border-radius: 50%;
            z-index: 1;
        }
        
        .selected {
            box-shadow: inset 0 0 0 5px #00ff00;
        }
        
        .info {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 10px;
            width: 250px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }
        
        .status {
            font-size: 1.3em;
            margin-bottom: 15px;
            text-align: center;
        }
        
        button {
            padding: 10px 20px;
            font-size: 1em;
            background: #4a2c0f;
            color: #eee;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }
        
        button:hover {
            background: #6b3f1a;
        }
        
        .captured {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            font-size: 28px;
            margin-top: 15px;
        }
        
        .move-history {
            max-height: 300px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.95em;
        }
    </style>
</head>
<body>
    <h1>♟️ Local Chess ♟️</h1>
    <div class="game-container">
        <div id="board"></div>
        
        <div class="info">
            <div id="status" class="status">White's turn</div>
            
            <div>
                <strong>Move History</strong>
                <div id="move-history" class="move-history"></div>
            </div>
            
            <div style="margin-top: 20px;">
                <strong>Captured by White</strong>
                <div id="captured-white" class="captured"></div>
            </div>
            
            <div style="margin-top: 15px;">
                <strong>Captured by Black</strong>
                <div id="captured-black" class="captured"></div>
            </div>
            
            <button onclick="resetGame()">New Game</button>
        </div>
    </div>

    <script>
        // Chess pieces (Unicode)
        const pieces = {
            'K': '♔', 'Q': '♕', 'R': '♖', 'B': '♗', 'N': '♘', 'P': '♙',
            'k': '♚', 'q': '♛', 'r': '♜', 'b': '♝', 'n': '♞', 'p': '♟'
        };

        // Board state
        let board = [
            ['r', 'n', 'b', 'q', 'k', 'b', 'n', 'r'],
            ['p', 'p', 'p', 'p', 'p', 'p', 'p', 'p'],
            [null, null, null, null, null, null, null, null],
            [null, null, null, null, null, null, null, null],
            [null, null, null, null, null, null, null, null],
            [null, null, null, null, null, null, null, null],
            ['P', 'P', 'P', 'P', 'P', 'P', 'P', 'P'],
            ['R', 'N', 'B', 'Q', 'K', 'B', 'N', 'R']
        ];

        let currentTurn = 'white';
        let selectedPiece = null;
        let moveHistory = [];
        let capturedWhite = [];
        let capturedBlack = [];

        const files = 'abcdefgh';

        // Create board
        function createBoard() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            
            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    const square = document.createElement('div');
                    square.classList.add('square');
                    square.dataset.row = row;
                    square.dataset.col = col;
                    
                    // Color squares
                    if ((row + col) % 2 === 0) {
                        square.classList.add('light');
                    } else {
                        square.classList.add('dark');
                    }
                    
                    // Add piece
                    const piece = board[row][col];
                    if (piece) {
                        square.innerHTML = pieces[piece];
                    }
                    
                    square.addEventListener('click', handleSquareClick);
                    boardEl.appendChild(square);
                }
            }
        }

        function handleSquareClick(e) {
            const row = parseInt(e.currentTarget.dataset.row);
            const col = parseInt(e.currentTarget.dataset.col);
            const piece = board[row][col];
            
            // If a piece is already selected
            if (selectedPiece) {
                const [selRow, selCol] = selectedPiece;
                const selectedPieceType = board[selRow][selCol];
                
                // Clicked same square = deselect
                if (selRow === row && selCol === col) {
                    clearHighlights();
                    selectedPiece = null;
                    return;
                }
                
                // Try to move
                if (isValidMove(selRow, selCol, row, col)) {
                    makeMove(selRow, selCol, row, col);
                } else {
                    // If clicking another piece of same color, select it instead
                    if (piece && isSameColor(selectedPieceType, piece)) {
                        clearHighlights();
                        selectPiece(row, col);
                    } else {
                        clearHighlights();
                        selectedPiece = null;
                    }
                }
            } 
            // Select a piece
            else if (piece) {
                const isWhitePiece = piece === piece.toUpperCase();
                if ((currentTurn === 'white' && isWhitePiece) || 
                    (currentTurn === 'black' && !isWhitePiece)) {
                    selectPiece(row, col);
                }
            }
        }

        function selectPiece(row, col) {
            selectedPiece = [row, col];
            clearHighlights();
            
            // Highlight selected square
            const square = getSquareElement(row, col);
            square.classList.add('selected');
            
            // Show possible moves
            showPossibleMoves(row, col);
        }

        function getSquareElement(row, col) {
            return document.querySelector(`.square[data-row="${row}"][data-col="${col}"]`);
        }

        function clearHighlights() {
            document.querySelectorAll('.square').forEach(square => {
                square.classList.remove('highlight', 'selected', 'possible', 'capture');
            });
        }

        function showPossibleMoves(row, col) {
            const piece = board[row][col];
            if (!piece) return;
            
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    if (isValidMove(row, col, r, c)) {
                        const square = getSquareElement(r, c);
                        square.classList.add('highlight');
                        
                        if (board[r][c]) {
                            square.classList.add('capture');
                        } else {
                            square.classList.add('possible');
                        }
                    }
                }
            }
        }

        function isSameColor(piece1, piece2) {
            return (piece1 === piece1.toUpperCase()) === (piece2 === piece2.toUpperCase());
        }

        // Basic move validation
        function isValidMove(fromRow, fromCol, toRow, toCol) {
            if (fromRow === toRow && fromCol === toCol) return false;
            
            const piece = board[fromRow][fromCol];
            if (!piece) return false;
            
            const target = board[toRow][toCol];
            
            // Can't capture own piece
            if (target && isSameColor(piece, target)) return false;
            
            const pieceType = piece.toLowerCase();
            const isWhite = piece === piece.toUpperCase();
            
            switch (pieceType) {
                case 'p': return validatePawn(fromRow, fromCol, toRow, toCol, isWhite);
                case 'r': return validateRook(fromRow, fromCol, toRow, toCol);
                case 'n': return validateKnight(fromRow, fromCol, toRow, toCol);
                case 'b': return validateBishop(fromRow, fromCol, toRow, toCol);
                case 'q': return validateQueen(fromRow, fromCol, toRow, toCol);
                case 'k': return validateKing(fromRow, fromCol, toRow, toCol);
                default: return false;
            }
        }

        function validatePawn(fromRow, fromCol, toRow, toCol, isWhite) {
            const direction = isWhite ? -1 : 1;
            const startRow = isWhite ? 6 : 1;
            
            // Forward move
            if (fromCol === toCol) {
                if (toRow === fromRow + direction && !board[toRow][toCol]) {
                    return true;
                }
                // Double move from starting position
                if (fromRow === startRow && 
                    toRow === fromRow + 2 * direction && 
                    !board[toRow][toCol] && 
                    !board[fromRow + direction][toCol]) {
                    return true;
                }
            }
            
            // Capture
            if (Math.abs(fromCol - toCol) === 1 && 
                toRow === fromRow + direction && 
                board[toRow][toCol]) {
                return true;
            }
            
            return false;
        }

        function validateRook(fromRow, fromCol, toRow, toCol) {
            if (fromRow !== toRow && fromCol !== toCol) return false;
            return isPathClear(fromRow, fromCol, toRow, toCol);
        }

        function validateKnight(fromRow, fromCol, toRow, toCol) {
            const rowDiff = Math.abs(fromRow - toRow);
            const colDiff = Math.abs(fromCol - toCol);
            return (rowDiff === 2 && colDiff === 1) || (rowDiff === 1 && colDiff === 2);
        }

        function validateBishop(fromRow, fromCol, toRow, toCol) {
            if (Math.abs(fromRow - toRow) !== Math.abs(fromCol - toCol)) return false;
            return isPathClear(fromRow, fromCol, toRow, toCol);
        }

        function validateQueen(fromRow, fromCol, toRow, toCol) {
            return validateRook(fromRow, fromCol, toRow, toCol) || 
                   validateBishop(fromRow, fromCol, toRow, toCol);
        }

        function validateKing(fromRow, fromCol, toRow, toCol) {
            const rowDiff = Math.abs(fromRow - toRow);
            const colDiff = Math.abs(fromCol - toCol);
            return rowDiff <= 1 && colDiff <= 1;
        }

        function isPathClear(fromRow, fromCol, toRow, toCol) {
            const rowStep = Math.sign(toRow - fromRow);
            const colStep = Math.sign(toCol - fromCol);
            
            let r = fromRow + rowStep;
            let c = fromCol + colStep;
            
            while (r !== toRow || c !== toCol) {
                if (board[r][c]) return false;
                r += rowStep;
                c += colStep;
            }
            return true;
        }

        function makeMove(fromRow, fromCol, toRow, toCol) {
            const piece = board[fromRow][fromCol];
            const captured = board[toRow][toCol];
            
            // Record move
            const moveNotation = getMoveNotation(fromRow, fromCol, toRow, toCol, piece, captured);
            moveHistory.push(moveNotation);
            updateMoveHistory();
            
            // Capture piece
            if (captured) {
                if (piece === piece.toUpperCase()) {
                    capturedBlack.push(captured);
                    updateCaptured('black');
                } else {
                    capturedWhite.push(captured);
                    updateCaptured('white');
                }
            }
            
            // Move piece
            board[toRow][toCol] = piece;
            board[fromRow][fromCol] = null;
            
            // Pawn promotion (auto queen)
            if (piece === 'P' && toRow === 0) {
                board[toRow][toCol] = 'Q';
            }
            if (piece === 'p' && toRow === 7) {
                board[toRow][toCol] = 'q';
            }
            
            // Update UI
            createBoard();
            
            // Switch turn
            currentTurn = currentTurn === 'white' ? 'black' : 'white';
            document.getElementById('status').textContent = 
                `${currentTurn.charAt(0).toUpperCase() + currentTurn.slice(1)}'s turn`;
            
            selectedPiece = null;
            clearHighlights();
        }

        function getMoveNotation(fromRow, fromCol, toRow, toCol, piece, captured) {
            const fromFile = files[fromCol];
            const toFile = files[toCol];
            const toRank = 8 - toRow;
            
            let notation = '';
            
            if (piece.toLowerCase() !== 'p') {
                notation += piece.toUpperCase();
            }
            
            if (captured) {
                if (piece.toLowerCase() === 'p') {
                    notation += fromFile;
                }
                notation += 'x';
            }
            
            notation += toFile + toRank;
            
            return notation;
        }

        function updateMoveHistory() {
            const historyEl = document.getElementById('move-history');
            historyEl.innerHTML = moveHistory.map((move, i) => {
                return `<div>${Math.floor(i/2) + 1}. ${i % 2 === 0 ? move : ''} ${i % 2 === 1 ? move : ''}</div>`;
            }).join('');
        }

        function updateCaptured(color) {
            const container = document.getElementById(`captured-${color}`);
            const piecesList = color === 'white' ? capturedWhite : capturedBlack;
            
            container.innerHTML = piecesList.map(p => `<span>${pieces[p]}</span>`).join('');
        }

        function resetGame() {
            board = [
                ['r', 'n', 'b', 'q', 'k', 'b', 'n', 'r'],
                ['p', 'p', 'p', 'p', 'p', 'p', 'p', 'p'],
                [null, null, null, null, null, null, null, null],
                [null, null, null, null, null, null, null, null],
                [null, null, null, null, null, null, null, null],
                [null, null, null, null, null, null, null, null],
                ['P', 'P', 'P', 'P', 'P', 'P', 'P', 'P'],
                ['R', 'N', 'B', 'Q', 'K', 'B', 'N', 'R']
            ];
            
            currentTurn = 'white';
            selectedPiece = null;
            moveHistory = [];
            capturedWhite = [];
            capturedBlack = [];
            
            document.getElementById('status').textContent = "White's turn";
            document.getElementById('move-history').innerHTML = '';
            document.getElementById('captured-white').innerHTML = '';
            document.getElementById('captured-black').innerHTML = '';
            
            createBoard();
        }

        // Initialize game
        window.onload = function() {
            createBoard();
        };
    </script>
</body>
</html>
