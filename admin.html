<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>UNO ADMIN PANEL</title>
    <style>
        body { background: #0f0f0f; color: #0f0; font-family: 'Courier New', monospace; margin: 0; padding: 20px; }
        h1 { color: #ff0; text-align: center; }
        .status { color: #0ff; text-align: center; font-size: 18px; margin: 10px 0; }
        .player { background: #1a1a1a; border: 2px solid #0f0; margin: 15px 0; padding: 15px; border-radius: 8px; }
        .hand { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .mini-card { width: 60px; height: 90px; border: 2px solid white; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; }
        .Red { background: #c00; } .Green { background: #008000; } .Blue { background: #0000ff; } .Yellow { background: #ffcc00; color: black; } .Wild { background: conic-gradient(#c00, #0000ff, #ffcc00, #008000); }
        #controls { display: flex; justify-content: center; gap: 20px; margin-top: 40px; }
        button { width: 180px; height: 180px; font-size: 18px; font-weight: bold; border: 4px solid #0f0; background: #111; color: #0f0; cursor: pointer; border-radius: 12px; }
        button:hover { background: #222; }
        #kickBtn { border-color: #f00; color: #f66; }
        .log { margin-top: 30px; background: #111; padding: 15px; height: 180px; overflow-y: auto; border: 1px solid #333; font-size: 14px; }
    </style>
</head>
<body>
    <h1>UNO ADMIN PANEL - LIVE</h1>
    <div id="status" class="status">Connecting to ngrok...</div>
    <div id="playersList"></div>
    <div id="controls">
        <button id="kickBtn">FORCE KICK</button>
        <button>N/A</button>
        <button>N/A</button>
        <button>N/A</button>
    </div>
    <div class="log" id="log"></div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        let serverUrl = params.get('server');
        if (!serverUrl) serverUrl = prompt("Enter your ngrok URL[](https://xxxx.ngrok-free.app):");

        if (!serverUrl || !serverUrl.startsWith('https://')) {
            document.body.innerHTML = `<h1 style="color:red">❌ Invalid ngrok URL</h1>`;
        }

        const socket = io(serverUrl + '/admin', {
            transports: ['websocket'],
            reconnection: true
        });

        socket.on('connect', () => {
            document.getElementById('status').innerHTML = '✅ Connected to ngrok — live view';
            document.getElementById('status').style.color = '#0f0';
        });

        socket.on('connect_error', (err) => {
            console.error('Admin connection error:', err.message);
            document.getElementById('status').innerHTML = '❌ Connection failed — check console';
        });

        socket.on('adminState', (state) => {
            const container = document.getElementById('playersList');
            container.innerHTML = '<h2 style="color:#ff0">Players & Full Hands (live)</h2>';
            state.players.forEach(p => {
                const div = document.createElement('div');
                div.className = 'player';
                const handHTML = p.hand.map(c => `<div class="mini-card ${c.color}">${c.value || c.type || '?'}</div>`).join('');
                div.innerHTML = `<strong>${p.name}</strong> (${p.cardCount} cards) <div class="hand">${handHTML}</div>`;
                container.appendChild(div);
            });
        });

        socket.on('adminLog', (msg) => {
            const logDiv = document.getElementById('log');
            logDiv.innerHTML += `<div>> ${msg}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        });

        document.getElementById('kickBtn').onclick = () => {
            const name = prompt("Enter exact player name to FORCE KICK:");
            if (name) socket.emit('forceKick', name.trim());
        };
    </script>
</body>
</html>
