<!DOCTYPE html>
<html>
<head>
    <title>UNO No Mercy</title>
    <style>
        /* Your exact original styling from before — unchanged */
        body { background: #1a1a1a; color: white; font-family: 'Arial Black', Gadget, sans-serif; text-align: center; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #playerBar { height: 18vh; background: #222; border-bottom: 3px solid #444; display: flex; align-items: center; justify-content: center; overflow-x: auto; }
        .player-card { background: #333; padding: 10px 15px; margin: 0 10px; border-radius: 8px; border: 2px solid #555; min-width: 110px; transition: 0.3s; font-family: sans-serif; }
        .is-me { background-color: #4169e1 !important; border-color: #fff; }
        .player-active { border-color: #00ff00; box-shadow: 0 0 15px #00ff00; transform: scale(1.05); }
        #mainArea { flex: 1; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .card { display: inline-block; width: 90px; height: 135px; border-radius: 10px; margin: 8px; position: relative; border: 4px solid white; box-shadow: 3px 3px 8px rgba(0,0,0,0.6); cursor: pointer; overflow: hidden; transition: transform 0.2s; vertical-align: middle; }
        .card:hover { transform: translateY(-10px); }
        .card::before { content: ""; position: absolute; top: 15%; left: -15%; width: 130%; height: 70%; background: white; border-radius: 50%; transform: rotate(-25deg); z-index: 1; }
        .card::after { content: attr(data-value); position: absolute; top: 5px; left: 5px; font-size: 14px; color: white; z-index: 3; text-shadow: 1px 1px 2px black; }
        .card-inner { position: absolute; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; z-index: 2; font-size: 38px; font-style: italic; font-weight: 900; text-shadow: 3px 3px 0px rgba(0,0,0,0.2); }
        .Red { background-color: #c00; color: #c00; } .Green { background-color: #008000; color: #008000; } .Blue { background-color: #0000ff; color: #0000ff; } .Yellow { background-color: #ffcc00; color: #ffcc00; }
        .Wild { background: conic-gradient(#c00 0% 25%, #0000ff 25% 50%, #ffcc00 50% 75%, #008000 75% 100%); color: black; }
        #hand { background: #2a2a2a; padding: 20px; border-top: 6px solid #444; white-space: nowrap; overflow-x: auto; min-height: 180px; }
        button, select, input { padding: 12px 20px; font-size: 16px; font-weight: bold; margin: 5px; cursor: pointer; border-radius: 8px; border: none; background: #eee; }
        #drawBtn { background: #ffcc00; color: black; padding: 15px 30px; font-size: 20px; border: 3px solid white; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; flex-direction: column; justify-content: center; align-items: center; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        #winnerName { font-size: 80px; color: #ffcc00; text-shadow: 0 0 20px #ffcc00, 0 0 40px #ff8800; margin-bottom: 20px; animation: bounce 1s infinite alternate; }
        @keyframes bounce { from { transform: scale(1); } to { transform: scale(1.1); } }
    </style>
</head>
<body>
    <div id="winnerScreen" class="overlay">
        <h1 style="color: white; margin:0;">VICTORY</h1>
        <h1 id="winnerName"></h1>
        <button onclick="location.reload()" style="background: #00ff00; transform: scale(1.5);">PLAY AGAIN</button>
    </div>
    <div id="playerBar"><div id="playerList">Waiting for Cloudflare Tunnel...</div></div>
    <div id="mainArea">
        <div id="lobby">
            <h1>UNO MULTI-MODE</h1>
            <input type="text" id="name" placeholder="Enter New Nickname">
            <button onclick="join()">Join Lobby</button>
            <div>
                <select id="gameMode">
                    <option value="No Mercy">No Mercy</option>
                    <option value="OG">OG</option>
                </select>
                <button onclick="start()" style="background: #00ff00;">START</button>
            </div>
            <label><input type="checkbox" id="stackLower"> Allow Stacking</label>
        </div>
        <div id="game" style="display:none; width: 100%;">
            <h2 id="status"></h2>
            <div id="topCard"></div>
            <div style="margin-top: 20px;"><button id="drawBtn" onclick="draw()">DRAW</button></div>
        </div>
    </div>
    <div id="hand"></div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        let serverUrl = params.get('server');
        if (!serverUrl) serverUrl = prompt("Enter your Cloudflare Tunnel URL[](https://xxxx.trycloudflare.com):");

        if (!serverUrl || !serverUrl.startsWith('https://')) {
            document.body.innerHTML = `<h1 style="color:red;text-align:center;margin-top:100px">❌ No valid tunnel URL</h1>`;
        }

        console.log("🔗 Connecting to Cloudflare Tunnel:", serverUrl);

        const socket = io(serverUrl, {
            transports: ['websocket', 'polling'],
            reconnection: true,
            timeout: 20000
        });

        let myTurn = false;

        socket.on('connect', () => {
            console.log('✅ SUCCESS — Connected to your laptop!');
            document.getElementById('playerList').innerHTML = 'Connected! Join the lobby →';
            const n = document.getElementById('name').value || "Player";
            socket.emit('joinGame', { name: n });
        });

        socket.on('connect_error', (err) => console.error('Connection error:', err.message));

        // (rest of your original game functions — join, start, draw, gameState, play, etc. — exactly as in the previous version I gave you)
        function join() { /* same as before */ }
        function start() { /* same */ }
        function draw() { socket.emit('drawCard'); }
        socket.on('updateLobby', (ps) => { /* same */ });
        socket.on('gameState', (gs) => { /* same */ });
        function play(idx, card) { /* same */ }
        socket.on('gameOver', (w) => { /* same */ });
        socket.on('error', (m) => alert(m));
        socket.on('kicked', (msg) => { alert(msg); location.reload(); });
    </script>
</body>
</html>
