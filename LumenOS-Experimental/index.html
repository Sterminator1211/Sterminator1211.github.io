<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>LumenOS</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root{
    --bg:#0A0C10;
    --bg-2:#0E1116;
    --surface:#161A21;
    --surface-raised:#1E2430;
    --border:#262B34;
    --text:#EDEEF0;
    --text-dim:#9AA0AC;
    --text-faint:#565C68;
    --accent:#F2C14E;
    --accent-dim:rgba(242,193,78,.16);
    --cyan:#3EC1D3;
    --green:#6FCF97;
    --magenta:#E8659A;
    --steel:#7FA8C9;
    --flame:#F2703E;
    --radius:14px;
    --glow-color: var(--accent);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{
    background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    width:100%; height:100%; overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }
  #stage{ position:relative; width:100%; height:100vh; min-height:560px; background:var(--bg); overflow:hidden;}

  /* ---------- BOOT ---------- */
  #boot{
    position:absolute; inset:0; z-index:100;
    background:radial-gradient(circle at 50% 45%, #10141b 0%, #060708 75%);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:22px; cursor:pointer; transition:opacity .5s ease;
  }
  #boot .mark{ display:flex; align-items:center; gap:12px; }
  #boot .dot{
    width:14px; height:14px; border-radius:50%;
    background:var(--accent); box-shadow:0 0 24px 6px var(--accent-dim);
    animation:pulse 1.4s ease-in-out infinite;
  }
  #boot .word{ font-size:34px; font-weight:800; letter-spacing:6px; font-stretch:condensed; }
  #boot .track{ width:220px; height:3px; border-radius:2px; background:#1c212b; overflow:hidden; }
  #boot .fill{ height:100%; width:0%; background:linear-gradient(90deg,var(--accent),var(--flame)); }
  #boot .skip{ font-size:11px; letter-spacing:2px; color:var(--text-faint); text-transform:uppercase; }
  @keyframes pulse{ 0%,100%{ transform:scale(1); opacity:1;} 50%{ transform:scale(1.35); opacity:.6;} }

  /* ---------- GLOW (signature element) ---------- */
  .glow{
    position:absolute; z-index:1; pointer-events:none;
    border-radius:22px;
    background: radial-gradient(closest-side, var(--glow-color), transparent 72%);
    opacity:.35; filter:blur(18px);
    transition: transform .22s cubic-bezier(.2,.8,.3,1), width .22s ease, height .22s ease, opacity .2s ease, background .2s ease;
  }

  /* ---------- TOP BAR ---------- */
  .topbar{
    position:relative; z-index:5;
    height:64px; display:flex; align-items:center; justify-content:space-between;
    padding:0 34px; background:linear-gradient(180deg, rgba(10,12,16,.9), rgba(10,12,16,0));
  }
  .brand{ display:flex; align-items:center; gap:10px; font-weight:800; letter-spacing:3px; font-size:15px; font-stretch:condensed;}
  .brand .b-dot{ width:8px; height:8px; border-radius:50%; background:var(--accent); box-shadow:0 0 10px 2px var(--accent-dim); }
  .navtabs{ display:flex; gap:6px; }
  .navtabs button{
    background:none; border:1px solid transparent; color:var(--text-dim);
    font-size:13px; letter-spacing:.4px; padding:8px 16px; border-radius:999px; cursor:pointer;
  }
  .navtabs button.active{ color:var(--text); }
  .navtabs button.is-focused{ background:var(--surface-raised); color:var(--text); border-color:var(--border); }
  .status{ display:flex; align-items:center; gap:16px; color:var(--text-dim); font-size:13px; }
  .status .clock{ color:var(--text); font-variant-numeric:tabular-nums; letter-spacing:.5px; }
  .status svg{ display:block; }

  /* ---------- HOME ---------- */
  .home{ position:relative; z-index:2; height:calc(100vh - 64px - 40px); min-height:460px; overflow-y:auto; padding:6px 34px 20px; scrollbar-width:none; }
  .home::-webkit-scrollbar{ display:none; }

  .hero{
    position:relative; height:230px; border-radius:20px; overflow:hidden; margin-bottom:26px;
    background: linear-gradient(120deg,#1a2230,#0d1117 55%), radial-gradient(circle at 80% 20%, rgba(242,193,78,.18), transparent 55%);
    border:1px solid var(--border);
    display:flex; flex-direction:column; justify-content:flex-end; padding:26px 30px;
  }
  .hero .eyebrow{ font-size:11px; letter-spacing:3px; color:var(--accent); text-transform:uppercase; margin-bottom:8px; font-weight:700;}
  .hero h1{ font-size:30px; font-weight:800; letter-spacing:.3px; margin-bottom:6px; }
  .hero p{ font-size:13px; color:var(--text-dim); margin-bottom:18px; max-width:440px; }
  .hero-cta{
    align-self:flex-start; display:flex; align-items:center; gap:10px;
    background:var(--text); color:#0A0C10; border:none; font-weight:700; font-size:14px;
    padding:11px 22px; border-radius:999px; cursor:pointer;
  }

  .row{ margin-bottom:28px; }
  .row h2{ font-size:14px; font-weight:700; letter-spacing:.4px; color:var(--text-dim); margin-bottom:12px; }
  .rowtrack{ display:flex; gap:14px; overflow:visible; }

  .tile{
    position:relative; border-radius:14px; border:1px solid var(--border); background:var(--surface);
    cursor:pointer; flex:0 0 auto; transition:transform .16s ease, border-color .16s ease;
    display:flex; flex-direction:column; justify-content:flex-end; overflow:hidden;
  }
  .tile.is-focused, .app-icon.is-focused, .navtabs button.is-focused{ transform:translateY(-4px) scale(1.04); border-color:var(--accent); }
  .tile:focus, .app-icon:focus, button:focus{ outline:none; }

  .continue-tile{ width:210px; height:118px; padding:10px 12px; }
  .continue-tile .thumb-title{ font-size:13px; font-weight:700; }
  .continue-tile .thumb-sub{ font-size:11px; color:var(--text-dim); margin-top:2px;}
  .progress{ position:absolute; left:0; bottom:0; height:3px; background:rgba(255,255,255,.15); width:100%; }
  .progress i{ display:block; height:100%; background:var(--accent); }

  .apps-track{ display:grid; grid-template-columns:repeat(9, 96px); gap:16px; }
  .app-icon{
    width:96px; height:96px; border-radius:20px; border:1px solid var(--border);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px;
    cursor:pointer; background:var(--surface); transition:transform .16s ease, border-color .16s ease;
  }
  .app-icon .glyph{ width:34px; height:34px; }
  .app-icon span{ font-size:11px; color:var(--text-dim); font-weight:600; }

  .inputs-track{ display:flex; gap:14px; flex-wrap:wrap; }
  .input-tile{ width:150px; height:88px; padding:12px 14px; justify-content:space-between; }
  .input-tile .in-top{ display:flex; justify-content:space-between; align-items:flex-start; }
  .input-tile .in-name{ font-size:13px; font-weight:700; }
  .input-tile .in-device{ font-size:11px; color:var(--text-dim); margin-top:2px; }
  .dot-status{ width:7px; height:7px; border-radius:50%; background:var(--text-faint); margin-top:3px; }
  .dot-status.on{ background:var(--green); box-shadow:0 0 8px 1px rgba(111,207,151,.5); }

  /* ---------- OVERLAYS: APP / INPUT ---------- */
  .overlay{
    position:absolute; inset:0; z-index:20; display:none; flex-direction:column;
    align-items:center; justify-content:center; gap:18px; text-align:center;
    background:#07080B; opacity:0; transition:opacity .25s ease;
  }
  .overlay.active{ display:flex; opacity:1; }
  .overlay .app-mark{ width:74px; height:74px; border-radius:20px; display:flex; align-items:center; justify-content:center; }
  .overlay .app-mark svg{ width:36px; height:36px; }
  .overlay h2{ font-size:24px; font-weight:800; letter-spacing:.4px; }
  .overlay p{ font-size:13px; color:var(--text-dim); max-width:380px; }
  .overlay .backbtn{
    margin-top:6px; background:var(--surface-raised); color:var(--text); border:1px solid var(--border);
    padding:10px 20px; border-radius:999px; font-size:13px; font-weight:600; cursor:pointer;
  }
  .overlay .backbtn.is-focused{ border-color:var(--accent); }
  .signalbars{ display:flex; align-items:flex-end; gap:4px; height:28px; }
  .signalbars i{ display:block; width:6px; background:var(--text-faint); border-radius:2px; }
  .signalbars.on i{ background:var(--green); }

  /* ---------- SETTINGS ---------- */
  .settings{ background:rgba(6,7,9,.72); backdrop-filter:blur(6px); align-items:stretch; justify-content:flex-end; flex-direction:row; }
  .settings .panel{
    width:520px; height:100%; background:var(--bg-2); border-left:1px solid var(--border);
    display:flex; padding:36px 0; gap:0; text-align:left;
  }
  .settings .cats{ width:170px; display:flex; flex-direction:column; gap:4px; padding:0 14px; border-right:1px solid var(--border); }
  .settings .cats button{
    text-align:left; background:none; border:none; color:var(--text-dim); font-size:14px; font-weight:600;
    padding:12px 14px; border-radius:10px; cursor:pointer;
  }
  .settings .cats button.cat-active{ color:var(--text); background:var(--surface); }
  .settings .cats button.is-focused{ border:1px solid var(--accent); }
  .settings .content{ flex:1; padding:0 28px; display:flex; flex-direction:column; gap:22px; overflow-y:auto; }
  .settings .content h3{ font-size:12px; letter-spacing:2px; text-transform:uppercase; color:var(--text-faint); margin-bottom:2px; }
  .ctrl{ background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px; }
  .ctrl.is-focused{ border-color:var(--accent); }
  .ctrl.is-adjusting{ border-color:var(--cyan); box-shadow:0 0 0 3px rgba(62,193,211,.15); }
  .ctrl-label{ font-size:13px; font-weight:700; margin-bottom:10px; display:flex; justify-content:space-between; }
  .ctrl-label small{ color:var(--text-dim); font-weight:600; }
  .bar-track{ height:6px; border-radius:4px; background:#262b34; overflow:hidden; }
  .bar-fill{ height:100%; background:linear-gradient(90deg,var(--accent),var(--flame)); }
  .opts{ display:flex; gap:8px; flex-wrap:wrap; }
  .opt{ padding:6px 12px; border-radius:999px; font-size:12px; background:#20252e; color:var(--text-dim); }
  .opt.sel{ background:var(--accent-dim); color:var(--accent); font-weight:700; }
  .toggle-row{ display:flex; align-items:center; justify-content:space-between; }
  .switch{ width:40px; height:22px; border-radius:12px; background:#262b34; position:relative; transition:background .15s; }
  .switch .knob{ position:absolute; top:2px; left:2px; width:18px; height:18px; border-radius:50%; background:var(--text-dim); transition:transform .15s, background .15s; }
  .switch.on{ background:var(--accent-dim); }
  .switch.on .knob{ transform:translateX(18px); background:var(--accent); }
  .about-card{ font-size:12px; color:var(--text-dim); line-height:1.7; }
  .about-card b{ color:var(--text); }

  /* ---------- FOOTER HINTS ---------- */
  .hints{
    position:relative; z-index:5; height:40px; display:flex; align-items:center; justify-content:center; gap:22px;
    color:var(--text-faint); font-size:11.5px; letter-spacing:.3px; border-top:1px solid var(--border);
  }
  .hints b{ color:var(--text-dim); }
</style>
</head>
<body>
<div id="stage">

  <div id="boot">
    <div class="mark"><div class="dot"></div><div class="word">LUMEN</div></div>
    <div class="track"><div class="fill" id="bootfill"></div></div>
    <div class="skip">tap to skip</div>
  </div>

  <div class="glow" id="glow"></div>

  <header class="topbar">
    <div class="brand"><span class="b-dot"></span>LUMEN OS</div>
    <div class="navtabs" id="navtabs"></div>
    <div class="status">
      <svg id="wifiIcon" width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M4 9c4.5-4 11.5-4 16 0M7.2 12.5c2.8-2.4 6.8-2.4 9.6 0M10.4 16c1-1 2.2-1 3.2 0" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="19" r="1.2" fill="currentColor"/></svg>
      <span>HD</span>
      <span class="clock" id="clock">--:--</span>
    </div>
  </header>

  <main class="home" id="home">
    <section class="hero">
      <div class="eyebrow">Featured Tonight</div>
      <h1 id="heroTitle">Quiet Frequency</h1>
      <p>A signal engineer traces a decades-old broadcast anomaly back to the town that never stopped listening.</p>
      <button class="hero-cta" data-focusable data-screen="home" data-row="1" data-col="0" data-action="hero">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M7 5v14l12-7z"/></svg>
        Play Now
      </button>
    </section>

    <section class="row">
      <h2>Continue Watching</h2>
      <div class="rowtrack" id="continueTrack"></div>
    </section>

    <section class="row">
      <h2>Apps</h2>
      <div class="apps-track" id="appsTrack"></div>
    </section>

    <section class="row">
      <h2>Inputs</h2>
      <div class="inputs-track" id="inputsTrack"></div>
    </section>
  </main>

  <div class="overlay" id="appScreen" data-screen="app">
    <div class="app-mark" id="appMark"></div>
    <h2 id="appName"></h2>
    <p id="appDesc"></p>
    <button class="backbtn" data-focusable data-screen="app" data-row="0" data-col="0" data-action="back">Back to Home</button>
  </div>

  <div class="overlay" id="inputScreen" data-screen="input">
    <div class="signalbars" id="inputBars">
      <i style="height:6px"></i><i style="height:12px"></i><i style="height:18px"></i><i style="height:24px"></i>
    </div>
    <h2 id="inputName"></h2>
    <p id="inputDesc"></p>
    <button class="backbtn" data-focusable data-screen="input" data-row="0" data-col="0" data-action="back">Back to Home</button>
  </div>

  <div class="overlay settings" id="settingsScreen" data-screen="settings">
    <div class="panel">
      <div class="cats" id="settingsCats"></div>
      <div class="content" id="settingsContent"></div>
    </div>
  </div>

  <footer class="hints" id="hints">
    <span><b>&uarr;&darr;&larr;&rarr;</b> Navigate</span>
    <span><b>Enter</b> Select</span>
    <span><b>Backspace</b> Back</span>
  </footer>

</div>

<script>
(function(){
  "use strict";

  /* ---------------- DATA ---------------- */
  var APPS = [
    { id:"reel", name:"Reel", color:"var(--accent)", tagline:"Movies & series, curated nightly.",
      icon:'<path d="M8 5v14l11-7z" fill="currentColor"/>' },
    { id:"wavelength", name:"Wavelength", color:"var(--cyan)", tagline:"Stream stations tuned to your mood.",
      icon:'<rect x="3" y="10" width="3" height="6" fill="currentColor"/><rect x="8" y="6" width="3" height="14" fill="currentColor"/><rect x="13" y="2" width="3" height="18" fill="currentColor"/><rect x="18" y="8" width="3" height="8" fill="currentColor"/>' },
    { id:"arena", name:"Arena", color:"var(--green)", tagline:"Live scores and every replay.",
      icon:'<path d="M12 2l2.6 6.2L21 9l-5 4.6L17.4 21 12 17.3 6.6 21 8 13.6 3 9l6.4-.8z" fill="currentColor"/>' },
    { id:"skyline", name:"Skyline", color:"var(--steel)", tagline:"The day, briefed in five minutes.",
      icon:'<path d="M3 18h18M5 18V9l4-3 4 3v9M13 18v-6l4-2 4 2v6" stroke="currentColor" stroke-width="2" fill="none" stroke-linejoin="round"/>' },
    { id:"playhouse", name:"Playhouse", color:"var(--magenta)", tagline:"Shows and games built for kids.",
      icon:'<path d="M12 3l2.6 5.3 5.9.9-4.3 4.1 1 5.8L12 16.3 6.8 19l1-5.8-4.3-4.1 5.9-.9z" fill="currentColor"/>' },
    { id:"loop", name:"Loop", color:"var(--flame)", tagline:"Short clips, endlessly refreshed.",
      icon:'<path d="M4 12a8 8 0 1 1 2.6 5.9" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/><path d="M4 8v5h5" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>' },
    { id:"nest", name:"Nest", color:"#8FD3C7", tagline:"Lights, locks and cameras, at a glance.",
      icon:'<path d="M4 11l8-7 8 7v9a1 1 0 0 1-1 1h-4v-6H9v6H5a1 1 0 0 1-1-1z" fill="currentColor"/>' },
    { id:"store", name:"Store", color:"var(--text-dim)", tagline:"Browse every app for LumenOS.",
      icon:'<path d="M12 3v14M5 10h14" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/><rect x="4" y="17" width="16" height="4" rx="1.5" stroke="currentColor" stroke-width="2" fill="none"/>' },
    { id:"youtube", name:"YouTube", color:"#FF0000", tagline:"Watch videos, streams, and content.",
      icon:'<path d="M23.5 6.2c-.3-1.1-1-2-2.2-2.3C19.4 3.5 12 3.5 12 3.5s-7.4 0-9.3.4c-1.2.3-2 1.2-2.3 2.3C0 8.1 0 12 0 12s0 3.9.5 5.8c.3 1.1 1.1 2 2.3 2.3 1.9.4 9.3.4 9.3.4s7.4 0 9.3-.4c1.2-.3 2-1.2 2.3-2.3.5-1.9.5-5.8.5-5.8s0-3.9-.5-5.8z" fill="currentColor"/><path d="M9.6 15.6l6.2-3.6-6.2-3.6v7.2z" fill="#07080B"/>' }
  ];

  var CONTINUE = [
    { title:"Quiet Frequency", sub:"S1 · E4 · 12 min left", pct:78 },
    { title:"Northbound", sub:"Movie · 41 min left", pct:34 },
    { title:"Harbor Lights", sub:"S2 · E1 · 3 min left", pct:95 },
    { title:"Afterglow", sub:"Album · Wavelength", pct:12 },
    { title:"Late Static", sub:"S1 · E9 · 22 min left", pct:60 }
  ];

  var INPUTS = [
    { id:"hdmi1", name:"HDMI 1", device:"Console", connected:true },
    { id:"hdmi2", name:"HDMI 2", device:"Soundbar", connected:true },
    { id:"hdmi3", name:"HDMI 3", device:"No device", connected:false },
    { id:"hdmi4", name:"HDMI 4", device:"No device", connected:false },
    { id:"av", name:"AV", device:"No device", connected:false },
    { id:"tuner", name:"Antenna", device:"Live TV", connected:true }
  ];

  var SETTINGS_CATS = ["Picture","Sound","Network","About"];

  var state = {
    screen:"home",           // home | app | input | settings
    activeApp:null,
    activeInput:null,
    navFocusIndex:0,
    settingsCatIndex:0,
    settingsZone:"categories", // categories | content
    settingsContentIndex:0,
    adjusting:false,
    picture:{ mode:"Standard", brightness:62, contrast:55 },
    sound:{ volume:38, mode:"Standard" },
    network:{ wifiOn:true, btOn:false },
    lastHomeFocus:null
  };

  /* ---------------- RENDER: HOME STATIC LISTS ---------------- */
  var navtabsEl = document.getElementById("navtabs");
  ["Home","Apps","Inputs","Settings"].forEach(function(label, i){
    var b = document.createElement("button");
    b.textContent = label;
    b.setAttribute("data-focusable","");
    b.setAttribute("data-screen","home");
    b.setAttribute("data-row","0");
    b.setAttribute("data-col", i);
    b.setAttribute("data-action","navtab");
    b.setAttribute("data-target", label.toLowerCase());
    if(label==="Home") b.classList.add("active");
    navtabsEl.appendChild(b);
  });

  var continueTrack = document.getElementById("continueTrack");
  CONTINUE.forEach(function(item, i){
    var d = document.createElement("div");
    d.className = "tile continue-tile";
    d.setAttribute("data-focusable","");
    d.setAttribute("data-screen","home");
    d.setAttribute("data-row","2");
    d.setAttribute("data-col", i);
    d.setAttribute("data-action","continue");
    d.setAttribute("data-glow","var(--accent)");
    d.innerHTML =
      '<div class="thumb-title">'+item.title+'</div>' +
      '<div class="thumb-sub">'+item.sub+'</div>' +
      '<div class="progress"><i style="width:'+item.pct+'%"></i></div>';
    continueTrack.appendChild(d);
  });

  var appsTrack = document.getElementById("appsTrack");
  APPS.forEach(function(app, i){
    var d = document.createElement("div");
    d.className = "app-icon";
    d.setAttribute("data-focusable","");
    d.setAttribute("data-screen","home");
    d.setAttribute("data-row","3");
    d.setAttribute("data-col", i);
    d.setAttribute("data-action","app");
    d.setAttribute("data-app", app.id);
    d.setAttribute("data-glow", app.color);
    d.innerHTML =
      '<svg class="glyph" viewBox="0 0 24 24" style="color:'+app.color+'">'+app.icon+'</svg>' +
      '<span>'+app.name+'</span>';
    appsTrack.appendChild(d);
  });

  var inputsTrack = document.getElementById("inputsTrack");
  INPUTS.forEach(function(inp, i){
    var d = document.createElement("div");
    d.className = "tile input-tile";
    d.setAttribute("data-focusable","");
    d.setAttribute("data-screen","home");
    d.setAttribute("data-row","4");
    d.setAttribute("data-col", i);
    d.setAttribute("data-action","input");
    d.setAttribute("data-input", inp.id);
    d.setAttribute("data-glow","var(--cyan)");
    d.innerHTML =
      '<div class="in-top"><div><div class="in-name">'+inp.name+'</div><div class="in-device">'+inp.device+'</div></div>' +
      '<div class="dot-status'+(inp.connected?' on':'')+'"></div></div>';
    inputsTrack.appendChild(d);
  });

  /* ---------------- FOCUS ENGINE ---------------- */
  var glow = document.getElementById("glow");

  function focusables(){
    return Array.prototype.slice.call(document.querySelectorAll('[data-focusable][data-screen="'+state.screen+'"]'))
      .filter(function(el){ return el.offsetParent !== null; });
  }

  function currentFocused(){
    return document.querySelector('[data-focusable].is-focused[data-screen="'+state.screen+'"]');
  }

  function setFocus(el, opts){
    if(!el) return;
    var all = document.querySelectorAll('[data-focusable].is-focused');
    all.forEach(function(e){ e.classList.remove("is-focused"); });
    el.classList.add("is-focused");
    el.focus({preventScroll:true});
    if(!opts || !opts.skipScroll){ el.scrollIntoView({block:"nearest", inline:"nearest", behavior:"smooth"}); }
    updateGlow(el);
    if(state.screen==="home"){ state.lastHomeFocus = { row:el.dataset.row, col:el.dataset.col }; }
  }

  function updateGlow(el){
    var stage = document.getElementById("stage");
    var r = el.getBoundingClientRect();
    var s = stage.getBoundingClientRect();
    var pad = 10;
    glow.style.width = (r.width + pad*2) + "px";
    glow.style.height = (r.height + pad*2) + "px";
    glow.style.transform = "translate(" + (r.left - s.left - pad) + "px," + (r.top - s.top - pad) + "px)";
    var color = el.getAttribute("data-glow") || "var(--accent)";
    glow.style.setProperty("--glow-color", color);
    glow.style.opacity = (state.screen==="home") ? .35 : 0;
  }

  function moveHome(dir){
    var items = focusables();
    var cur = currentFocused();
    if(!cur){ setFocus(items[0]); return; }
    var row = parseInt(cur.dataset.row,10), col = parseInt(cur.dataset.col,10);
    var rows = {};
    items.forEach(function(el){
      var rr = parseInt(el.dataset.row,10);
      (rows[rr] = rows[rr] || []).push(el);
    });
    Object.keys(rows).forEach(function(k){ rows[k].sort(function(a,b){ return a.dataset.col - b.dataset.col; }); });
    var rowKeys = Object.keys(rows).map(Number).sort(function(a,b){return a-b;});

    if(dir==="left" || dir==="right"){
      var list = rows[row];
      var idx = list.indexOf(cur);
      var next = dir==="left" ? idx-1 : idx+1;
      if(next>=0 && next<list.length) setFocus(list[next]);
      return;
    }
    if(dir==="up" || dir==="down"){
      var ri = rowKeys.indexOf(row);
      var nri = dir==="up" ? ri-1 : ri+1;
      if(nri<0 || nri>=rowKeys.length) return;
      var targetRow = rows[rowKeys[nri]];
      var best = targetRow[0], bestDist = Infinity;
      targetRow.forEach(function(el){
        var dist = Math.abs(el.dataset.col - col);
        if(dist < bestDist){ bestDist = dist; best = el; }
      });
      setFocus(best);
    }
  }

  /* ---------------- SCREEN SWITCHING ---------------- */
  function showScreen(name){
    ["app","input","settings"].forEach(function(s){
      document.getElementById(s+"Screen").classList.toggle("active", name===s);
    });
    state.screen = name;

    var iframe = document.getElementById("appIframe");
    var mark = document.getElementById("appMark");
    var nameEl = document.getElementById("appName");
    var desc = document.getElementById("appDesc");
    
    if(name === "app" && state.activeApp && state.activeApp.id === "youtube") {
      if(mark) mark.style.display = "none";
      if(nameEl) nameEl.style.display = "none";
      if(desc) desc.style.display = "none";
    } else {
      if(mark) mark.style.display = "flex";
      if(nameEl) nameEl.style.display = "block";
      if(desc) desc.style.display = "block";
      if(iframe) {
        iframe.style.display = "none";
        iframe.src = "about:blank"; 
      }
    }

    if(name==="home"){
      var target = null;
      if(state.lastHomeFocus){
        target = document.querySelector('[data-focusable][data-screen="home"][data-row="'+state.lastHomeFocus.row+'"][data-col="'+state.lastHomeFocus.col+'"]');
      }
      setFocus(target || focusables()[0]);
    } else if(name==="settings"){
      state.settingsZone = "categories";
      renderSettings();
      focusSettings();
    } else {
      setFocus(focusables()[0]);
    }
  }

  function openApp(id){
    var app = APPS.filter(function(a){ return a.id===id; })[0];
    if(!app) return;
    state.activeApp = app;

    if(id === "youtube") {
      var iframe = document.getElementById("appIframe");
      if(!iframe) {
        iframe = document.createElement("iframe");
        iframe.id = "appIframe";
        iframe.style.width = "95%";
        iframe.style.height = "78%";
        iframe.style.border = "none";
        iframe.style.borderRadius = "12px";
        iframe.style.background = "#000";
        var backBtn = document.querySelector("#appScreen .backbtn");
        document.getElementById("appScreen").insertBefore(iframe, backBtn);
      }
      iframe.src = "https://touyube.vercel.app/";
      iframe.style.display = "block";
    } else {
      document.getElementById("appMark").style.background = "color-mix(in srgb, " + app.color + " 20%, transparent)";
      document.getElementById("appMark").innerHTML = '<svg viewBox="0 0 24 24" style="color:'+app.color+'">'+app.icon+'</svg>';
      document.getElementById("appName").textContent = app.name;
      document.getElementById("appDesc").textContent = app.tagline;
    }
    showScreen("app");
  }

  function openInput(id){
    var inp = INPUTS.filter(function(a){ return a.id===id; })[0];
    if(!inp) return;
    state.activeInput = inp;
    document.getElementById("inputBars").classList.toggle("on", inp.connected);
    document.getElementById("inputName").textContent = inp.name + (inp.connected ? " — Signal Detected" : " — No Signal");
    document.getElementById("inputDesc").textContent = inp.connected ? ("Connected device: " + inp.device) : "Check the cable connection or turn on the source device.";
    showScreen("input");
  }

  function playHero(){
    state.activeApp = APPS[0];
    document.getElementById("appMark").style.background = "color-mix(in srgb, var(--accent) 20%, transparent)";
    document.getElementById("appMark").innerHTML = '<svg viewBox="0 0 24 24" style="color:var(--accent)">'+APPS[0].icon+'</svg>';
    document.getElementById("appName").textContent = "Quiet Frequency";
    document.getElementById("appDesc").textContent = "Resuming on Reel — Season 1, Episode 4.";
    showScreen("app");
  }

  function continueTile(idx){
    var item = CONTINUE[idx];
    state.activeApp = APPS[0];
    document.getElementById("appMark").style.background = "color-mix(in srgb, var(--accent) 20%, transparent)";
    document.getElementById("appMark").innerHTML = '<svg viewBox="0 0 24 24" style="color:var(--accent)">'+APPS[0].icon+'</svg>';
    document.getElementById("appName").textContent = item.title;
    document.getElementById("appDesc").textContent = "Resuming — " + item.sub + ".";
    showScreen("app");
  }

  /* ---------------- SETTINGS ---------------- */
  function contentForCat(cat){
    if(cat==="Picture") return [
      { type:"radio", label:"Picture Mode", key:"mode", scope:"picture", options:["Vivid","Standard","Movie","Game"] },
      { type:"range", label:"Brightness", key:"brightness", scope:"picture", min:0, max:100 },
      { type:"range", label:"Contrast", key:"contrast", scope:"picture", min:0, max:100 }
    ];
    if(cat==="Sound") return [
      { type:"range", label:"Volume", key:"volume", scope:"sound", min:0, max:100 },
      { type:"radio", label:"Sound Mode", key:"mode", scope:"sound", options:["Standard","Night","Speech Clarity"] }
    ];
    if(cat==="Network") return [
      { type:"toggle", label:"Wi-Fi", key:"wifiOn", scope:"network" },
      { type:"toggle", label:"Bluetooth", key:"btOn", scope:"network" }
    ];
    return [ { type:"button", label:"Restart LumenOS", action:"restart" } ];
  }

  function renderSettings(){
    var catsEl = document.getElementById("settingsCats");
    catsEl.innerHTML = "";
    SETTINGS_CATS.forEach(function(cat, i){
      var b = document.createElement("button");
      b.textContent = cat;
      b.setAttribute("data-focusable","");
      b.setAttribute("data-screen","settings");
      b.setAttribute("data-zone","categories");
      b.setAttribute("data-row", i);
      b.setAttribute("data-col","0");
      if(i===state.settingsCatIndex) b.classList.add("cat-active");
      catsEl.appendChild(b);
    });

    var cat = SETTINGS_CATS[state.settingsCatIndex];
    var contentEl = document.getElementById("settingsContent");
    contentEl.innerHTML = "";

    var h3 = document.createElement("h3");
    h3.textContent = cat;
    contentEl.appendChild(h3);

    if(cat==="About"){
      var about = document.createElement("div");
      about.className = "about-card";
      about.innerHTML = "<div><b>LumenOS</b> · Version 3.2.1</div><div>Model LM-55UHD</div><div>Storage: 6.1 GB of 16 GB used</div>";
      contentEl.appendChild(about);
    }

    var items = contentForCat(cat);
    items.forEach(function(item, i){
      var wrap = document.createElement("div");
      wrap.className = "ctrl";
      wrap.setAttribute("data-focusable","");
      wrap.setAttribute("data-screen","settings");
      wrap.setAttribute("data-zone","content");
      wrap.setAttribute("data-row", i);
      wrap.setAttribute("data-col","0");
      wrap.setAttribute("data-ctrltype", item.type);
      if(item.scope) wrap.setAttribute("data-scope", item.scope);
      if(item.key) wrap.setAttribute("data-key", item.key);
      if(item.action) wrap.setAttribute("data-caction", item.action);

      if(item.type==="range"){
        var val = state[item.scope][item.key];
        wrap.innerHTML = '<div class="ctrl-label"><span>'+item.label+'</span><small>'+val+'</small></div>' +
          '<div class="bar-track"><div class="bar-fill" style="width:'+val+'%"></div></div>';
      } else if(item.type==="radio"){
        var sel = state[item.scope][item.key];
        var optsHtml = item.options.map(function(o){
          return '<div class="opt'+(o===sel?' sel':'')+'">'+o+'</div>';
        }).join("");
        wrap.innerHTML = '<div class="ctrl-label"><span>'+item.label+'</span></div><div class="opts">'+optsHtml+'</div>';
        wrap.dataset.options = JSON.stringify(item.options);
      } else if(item.type==="toggle"){
        var on = state[item.scope][item.key];
        wrap.innerHTML = '<div class="toggle-row"><span class="ctrl-label" style="margin-bottom:0">'+item.label+'</span>' +
          '<div class="switch'+(on?' on':'')+'"><div class="knob"></div></div></div>';
      } else if(item.type==="button"){
        wrap.innerHTML = '<div class="ctrl-label" style="margin-bottom:0">'+item.label+'</div>';
      }
      contentEl.appendChild(wrap);
    });
  }

  function focusSettings(){
    var el;
    if(state.settingsZone==="categories"){
      el = document.querySelector('[data-focusable][data-screen="settings"][data-zone="categories"][data-row="'+state.settingsCatIndex+'"]');
    } else {
      el = document.querySelector('[data-focusable][data-screen="settings"][data-zone="content"][data-row="'+state.settingsContentIndex+'"]');
    }
    if(el){
      document.querySelectorAll('[data-focusable].is-focused').forEach(function(e){ e.classList.remove("is-focused"); });
      el.classList.add("is-focused");
      el.classList.toggle("is-adjusting", !!state.adjusting);
      el.focus({preventScroll:true});
      el.scrollIntoView({block:"nearest", behavior:"smooth"});
    }
  }

  function settingsNav(dir){
    var contentLen = contentForCat(SETTINGS_CATS[state.settingsCatIndex]).length;

    if(state.adjusting){
      if(dir==="left" || dir==="right"){ adjustCurrent(dir); }
      return;
    }

    if(dir==="down"){
      if(state.settingsZone==="categories"){
        state.settingsCatIndex = Math.min(state.settingsCatIndex+1, SETTINGS_CATS.length-1);
      } else {
        state.settingsContentIndex = Math.min(state.settingsContentIndex+1, contentLen-1);
      }
    } else if(dir==="up"){
      if(state.settingsZone==="categories"){
        state.settingsCatIndex = Math.max(state.settingsCatIndex-1, 0);
      } else {
        if(state.settingsContentIndex===0){ state.settingsZone="categories"; }
        else { state.settingsContentIndex--; }
      }
    } else if(dir==="right"){
      if(state.settingsZone==="categories"){
        state.settingsZone = "content";
        state.settingsContentIndex = 0;
        renderSettings();
      }
    } else if(dir==="left"){
      if(state.settingsZone==="content"){ state.settingsZone="categories"; }
    }
    renderSettings();
    focusSettings();
  }

  function adjustCurrent(dir){
    var cat = SETTINGS_CATS[state.settingsCatIndex];
    var items = contentForCat(cat);
    var item = items[state.settingsContentIndex];
    if(!item) return;
    if(item.type==="range"){
      var step = 5 * (dir==="right" ? 1 : -1);
      var v = state[item.scope][item.key] + step;
      v = Math.max(item.min, Math.min(item.max, v));
      state[item.scope][item.key] = v;
    } else if(item.type==="radio"){
      var idx = item.options.indexOf(state[item.scope][item.key]);
      idx = idx + (dir==="right" ? 1 : -1);
      idx = (idx + item.options.length) % item.options.length;
      state[item.scope][item.key] = item.options[idx];
    }
    renderSettings();
    focusSettings();
  }

  function activateSettingsCurrent(){
    if(state.settingsZone==="categories"){
      state.settingsZone = "content";
      state.settingsContentIndex = 0;
      renderSettings(); focusSettings();
      return;
    }
    var cat = SETTINGS_CATS[state.settingsCatIndex];
    var items = contentForCat(cat);
    var item = items[state.settingsContentIndex];
    if(!item) return;
    if(item.type==="range" || item.type==="radio"){
      state.adjusting = !state.adjusting;
      renderSettings(); focusSettings();
    } else if(item.type==="toggle"){
      state[item.scope][item.key] = !state[item.scope][item.key];
      if(item.key==="wifiOn") updateWifiIcon();
      renderSettings(); focusSettings();
    } else if(item.type==="button" && item.action==="restart"){
      doRestart();
    }
  }

  function updateWifiIcon(){
    document.getElementById("wifiIcon").style.opacity = state.network.wifiOn ? "1" : ".3";
  }

  function doRestart(){
    var boot = document.getElementById("boot");
    boot.style.display = "flex";
    boot.style.opacity = "1";
    var fill = document.getElementById("bootfill");
    fill.style.transition = "none";
    fill.style.width = "0%";
    showScreen("home");
    requestAnimationFrame(function(){
      fill.style.transition = "width 1.1s ease";
      fill.style.width = "100%";
    });
    setTimeout(function(){
      boot.style.opacity = "0";
      setTimeout(function(){ boot.style.display = "none"; }, 500);
    }, 1200);
  }

  /* ---------------- ACTIONS ---------------- */
  function activateHomeCurrent(el){
    var action = el.getAttribute("data-action");
    if(action==="navtab"){
      var target = el.getAttribute("data-target");
      document.querySelectorAll(".navtabs button").forEach(function(b){ b.classList.remove("active"); });
      el.classList.add("active");
      if(target==="settings"){ showScreen("settings"); return; }
      if(target==="apps"){ var f = document.querySelector('[data-focusable][data-screen="home"][data-row="3"][data-col="0"]'); if(f){ setFocus(f); } return; }
      if(target==="inputs"){ var g = document.querySelector('[data-focusable][data-screen="home"][data-row="4"][data-col="0"]'); if(g){ setFocus(g); } return; }
      if(target==="home"){ document.getElementById("home").scrollTo({top:0, behavior:"smooth"}); }
    } else if(action==="hero"){
      playHero();
    } else if(action==="continue"){
      continueTile(parseInt(el.getAttribute("data-col"),10));
    } else if(action==="app"){
      openApp(el.getAttribute("data-app"));
    } else if(action==="input"){
      openInput(el.getAttribute("data-input"));
    }
  }

  /* ---------------- INPUT HANDLING ---------------- */
  document.addEventListener("keydown", function(e){
    var key = e.key;

    if(document.getElementById("boot").style.display !== "none" && document.getElementById("boot").style.opacity !== "0"){
      if(document.getElementById("boot").style.display === "flex" && document.getElementById("boot").offsetParent !== null && !document.getElementById("boot").dataset.skippable === false){
        // handled by click; ignore key-skip complexity
      }
    }

    if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight","Enter"," ","Backspace","Escape"].indexOf(key)!==-1){
      e.preventDefault();
    }

    if(state.screen==="home"){
      if(key==="ArrowUp") moveHome("up");
      else if(key==="ArrowDown") moveHome("down");
      else if(key==="ArrowLeft") moveHome("left");
      else if(key==="ArrowRight") moveHome("right");
      else if(key==="Enter" || key===" "){
        var cur = currentFocused();
        if(cur) activateHomeCurrent(cur);
      }
    } else if(state.screen==="app" || state.screen==="input"){
      if(key==="Backspace" || key==="Escape" || key==="Enter" || key===" "){
        showScreen("home");
      }
    } else if(state.screen==="settings"){
      if(key==="Backspace" || key==="Escape"){
        if(state.adjusting){ state.adjusting=false; renderSettings(); focusSettings(); }
        else { showScreen("home"); }
      } else if(key==="ArrowUp") settingsNav("up");
      else if(key==="ArrowDown") settingsNav("down");
      else if(key==="ArrowLeft") settingsNav("left");
      else if(key==="ArrowRight") settingsNav("right");
      else if(key==="Enter" || key===" ") activateSettingsCurrent();
    }
  });

  // mouse support
  document.addEventListener("mouseover", function(e){
    var el = e.target.closest("[data-focusable]");
    if(!el) return;
    if(el.getAttribute("data-screen") !== state.screen) return;
    if(state.screen==="settings"){
      var zone = el.getAttribute("data-zone");
      state.settingsZone = zone;
      if(zone==="categories") state.settingsCatIndex = parseInt(el.getAttribute("data-row"),10);
      else state.settingsContentIndex = parseInt(el.getAttribute("data-row"),10);
      renderSettings();
      focusSettings();
    } else {
      setFocus(el, {skipScroll:true});
    }
  });

  document.addEventListener("click", function(e){
    var boot = document.getElementById("boot");
    if(boot.style.display !== "none" && getComputedStyle(boot).display !== "none"){
      skipBoot();
      return;
    }
    var el = e.target.closest("[data-focusable]");
    if(!el) return;
    if(state.screen==="home"){ setFocus(el); activateHomeCurrent(el); }
    else if(state.screen==="settings"){
      var zone = el.getAttribute("data-zone");
      state.settingsZone = zone;
      if(zone==="categories") state.settingsCatIndex = parseInt(el.getAttribute("data-row"),10);
      else state.settingsContentIndex = parseInt(el.getAttribute("data-row"),10);
      renderSettings();
      focusSettings();
      activateSettingsCurrent();
    } else {
      if(el.getAttribute("data-action")==="back") showScreen("home");
    }
  });

  window.addEventListener("resize", function(){
    var cur = currentFocused();
    if(cur) updateGlow(cur);
  });

  /* ---------------- CLOCK ---------------- */
  function tick(){
    var d = new Date();
    var h = d.getHours(), m = d.getMinutes();
    document.getElementById("clock").textContent =
      (h<10?"0":"")+h + ":" + (m<10?"0":"")+m;
  }
  tick();
  setInterval(tick, 15000);

  /* ---------------- BOOT ---------------- */
  var booted = false;
  function skipBoot(){
    if(booted) return;
    booted = true;
    var boot = document.getElementById("boot");
    boot.style.opacity = "0";
    setTimeout(function(){ boot.style.display = "none"; }, 500);
    setFocus(document.querySelector('[data-focusable][data-screen="home"][data-row="2"][data-col="0"]'));
  }
  setTimeout(function(){
    document.getElementById("bootfill").style.transition = "width 1.3s ease";
    document.getElementById("bootfill").style.width = "100%";
  }, 60);
  setTimeout(skipBoot, 1500);

  updateWifiIcon();

})();
</script>
</body>
</html>
