<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        (function() {
            // Replace with your actual EmailJS Public Key
            emailjs.init("c6wJz3OeKJF8JQuD-"); 
        })();
    </script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans h-screen flex overflow-hidden">

    <div class="w-full md:w-1/4 min-w-[280px] max-w-[400px] border-r border-slate-800 flex flex-col h-full bg-slate-950">
        <div class="p-4 border-b border-slate-800 flex justify-between items-center bg-slate-900/50">
            <h1 class="text-xl font-bold tracking-tight">Messages</h1>
            <button id="new-chat-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-semibold px-3 py-2 rounded-lg transition cursor-pointer">
                + New Chat
            </button>
        </div>

        <div id="contacts-list" class="flex-1 overflow-y-auto divide-y divide-slate-900">
            </div>
    </div>

    <div class="flex-1 flex flex-col h-full bg-slate-900 relative">
        
        <div class="p-4 border-b border-slate-800 bg-slate-900/50 flex items-center justify-between h-[65px]">
            <div>
                <h2 id="active-contact-title" class="text-lg font-semibold text-white">Select a contact</h2>
                <p id="active-contact-subtitle" class="text-xs text-slate-400"></p>
            </div>
            <div id="status-message" class="text-xs px-3 py-1 rounded hidden"></div>
        </div>

        <div id="messages-container" class="flex-1 overflow-y-auto p-4 space-y-3 bg-slate-900/30">
            <div class="text-slate-500 text-center mt-20" id="fallback-notice">
                Select an existing conversation or start a new chat to begin sending text messages.
            </div>
        </div>

        <div class="p-4 border-t border-slate-800 bg-slate-950/50">
            <form id="sms-form" class="flex items-end gap-2 max-w-4xl mx-auto">
                <div class="flex-1">
                    <textarea id="message-input" rows="2" maxlength="160" placeholder="Type a text message..." required disabled
                        class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-2.5 text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 text-sm transition resize-none disabled:opacity-50 disabled:cursor-not-allowed"></textarea>
                </div>
                <button type="submit" id="submit-btn" disabled
                    class="bg-indigo-600 hover:bg-indigo-700 disabled:bg-slate-800 text-white disabled:text-slate-500 font-semibold h-[44px] px-6 rounded-xl transition text-sm cursor-pointer disabled:cursor-not-allowed flex items-center justify-center">
                    Send
                </button>
            </form>
        </div>
    </div>

    <div id="new-chat-modal" class="fixed inset-0 bg-black/70 backdrop-blur-sm hidden items-center justify-center p-4 z-50">
        <div class="bg-slate-950 border border-slate-800 rounded-2xl w-full max-w-md p-6 shadow-2xl">
            <h3 class="text-lg font-bold text-white mb-4">Start New Conversation</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold uppercase text-slate-400 mb-1">10-Digit Phone Number</label>
                    <input type="tel" id="modal-phone" placeholder="5551234567" pattern="[0-9]{10}"
                        class="w-full bg-slate-900 border border-slate-800 rounded-xl px-3 py-2 text-white placeholder-slate-600 focus:outline-none focus:border-indigo-500 text-sm">
                </div>
                <div class="flex justify-end gap-2 pt-2">
                    <button id="modal-close" class="px-4 py-2 text-sm font-medium text-slate-400 hover:text-white transition cursor-pointer">Cancel</button>
                    <button id="modal-create" class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-4 py-2 rounded-xl text-sm transition cursor-pointer">Open Chat</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // DOM Elements
        const contactsList = document.getElementById('contacts-list');
        const messagesContainer = document.getElementById('messages-container');
        const activeContactTitle = document.getElementById('active-contact-title');
        const activeContactSubtitle = document.getElementById('active-contact-subtitle');
        const messageInput = document.getElementById('message-input');
        const submitBtn = document.getElementById('submit-btn');
        const smsForm = document.getElementById('sms-form');
        const statusMsg = document.getElementById('status-message');
        const fallbackNotice = document.getElementById('fallback-notice');
        
        // Modal Elements
        const newChatBtn = document.getElementById('new-chat-btn');
        const newChatModal = document.getElementById('new-chat-modal');
        const modalClose = document.getElementById('modal-close');
        const modalCreate = document.getElementById('modal-create');
        const modalPhone = document.getElementById('modal-phone');

        // State variables
        let appData = JSON.parse(localStorage.getItem('sms_app_data')) || {};
        let activeContact = null;

        // Save state helper
        function saveToLocalStorage() {
            localStorage.setItem('sms_app_data', JSON.stringify(appData));
        }

        // Render Sidebar List
        function renderContacts() {
            contactsList.innerHTML = '';
            const keys = Object.keys(appData);

            if (keys.length === 0) {
                contactsList.innerHTML = `<div class="text-xs text-slate-600 text-center p-6">No contacts yet.</div>`;
                return;
            }

            keys.forEach(phone => {
                const isSelected = activeContact === phone;
                const lastMessage = appData[phone].length > 0 ? appData[phone][appData[phone].length - 1].text : "No messages";

                const item = document.createElement('div');
                item.className = `p-3 flex items-center justify-between cursor-pointer group transition ${isSelected ? 'bg-indigo-950/40 border-l-4 border-indigo-500' : 'hover:bg-slate-900/50'}`;
                
                item.innerHTML = `
                    <div class="flex-1 min-w-0 pr-2 decoding-click-target">
                        <p class="text-sm font-semibold text-white truncate">${formatPhoneNumber(phone)}</p>
                        <p class="text-xs text-slate-400 truncate">${lastMessage}</p>
                    </div>
                    <div class="relative inline-block text-left opacity-60 group-hover:opacity-100 transition">
                        <button class="settings-btn p-1.5 hover:bg-slate-800 rounded-lg text-slate-400 hover:text-white" data-phone="${phone}">
                            ⚙️
                        </button>
                        <div class="dropdown-menu hidden absolute right-0 mt-1 w-36 bg-slate-950 border border-slate-800 rounded-lg shadow-xl py-1 z-10 text-xs">
                            <button class="w-full text-left px-3 py-1.5 hover:bg-slate-900 text-amber-400 clear-history-btn" data-phone="${phone}">Reset History</button>
                            <button class="w-full text-left px-3 py-1.5 hover:bg-slate-900 text-red-500 delete-contact-btn" data-phone="${phone}">Delete Chat</button>
                        </div>
                    </div>
                `;

                // Handle clicking the contact profile to load it
                item.querySelector('.decoding-click-target').addEventListener('click', () => {
                    selectContact(phone);
                });

                // Toggle dropdown menu
                const settingsBtn = item.querySelector('.settings-btn');
                const dropdown = item.querySelector('.dropdown-menu');
                settingsBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    // Close other dropdowns first
                    document.querySelectorAll('.dropdown-menu').forEach(d => { if(d !== dropdown) d.classList.add('hidden'); });
                    dropdown.classList.toggle('hidden');
                });

                // Dropdown Action: Clear History
                item.querySelector('.clear-history-btn').addEventListener('click', (e) => {
                    e.stopPropagation();
                    appData[phone] = [];
                    saveToLocalStorage();
                    dropdown.classList.add('hidden');
                    if (activeContact === phone) selectContact(phone);
                    renderContacts();
                });

                // Dropdown Action: Delete Contact Entirely
                item.querySelector('.delete-contact-btn').addEventListener('click', (e) => {
                    e.stopPropagation();
                    delete appData[phone];
                    saveToLocalStorage();
                    if (activeContact === phone) {
                        activeContact = null;
                        unloadChat();
                    }
                    renderContacts();
                });

                contactsList.appendChild(item);
            });
        }

        // Display Chat History on Right Screen
        function selectContact(phone) {
            activeContact = phone;
            renderContacts(); // Refresh selected highlight styling

            // Enable elements
            messageInput.disabled = false;
            submitBtn.disabled = false;
            fallbackNotice.classList.add('hidden');

            activeContactTitle.textContent = formatPhoneNumber(phone);
            activeContactSubtitle.textContent = "Routing via Text.Email";

            renderMessages();
        }

        function renderMessages() {
            messagesContainer.innerHTML = '';
            if (!activeContact || !appData[activeContact]) return;

            const history = appData[activeContact];
            if (history.length === 0) {
                messagesContainer.innerHTML = `<div class="text-xs text-slate-500 text-center mt-10">No messages sent to this contact yet.</div>`;
                return;
            }

            history.forEach(msg => {
                const bubble = document.createElement('div');
                bubble.className = "flex justify-end"; // Outbound orientation
                bubble.innerHTML = `
                    <div class="bg-indigo-600 text-white text-sm px-4 py-2 rounded-2xl rounded-tr-none max-w-xs md:max-w-md shadow-md break-words">
                        <p>${escapeHTML(msg.text)}</p>
                        <span class="text-[10px] text-indigo-200 block text-right mt-1">${msg.timestamp}</span>
                    </div>
                `;
                messagesContainer.appendChild(bubble);
            });

            // Scroll container to the absolute bottom
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function unloadChat() {
            activeContactTitle.textContent = "Select a contact";
            activeContactSubtitle.textContent = "";
            messageInput.value = "";
            messageInput.disabled = true;
            submitBtn.disabled = true;
            fallbackNotice.classList.remove('hidden');
            messagesContainer.innerHTML = '<div class="text-slate-500 text-center mt-20" id="fallback-notice">Select an existing conversation or start a new chat to begin sending text messages.</div>';
        }

        // Form Submit Handler (Send via EmailJS)
        smsForm.addEventListener('submit', function(e) {
            e.preventDefault();
            if (!activeContact) return;

            const bodyText = messageInput.value.trim();
            if (!bodyText) return;

            submitBtn.innerText = 'Sending...';
            submitBtn.disabled = true;

            // Configure EmailJS target payload
            const templateParams = {
                sms_gateway_email: `${activeContact}@text.email`,
                message: bodyText
            };

            const serviceID = 'service_x3caraj'; // Replace with yours
            const templateID = 'template_g9ene2j'; // Replace with yours

            emailjs.send(serviceID, templateID, templateParams)
                .then(() => {
                    submitBtn.innerText = 'Send';
                    submitBtn.disabled = false;
                    
                    // Track local copy in state storage
                    const now = new Date();
                    const timestamp = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    
                    appData[activeContact].push({
                        text: bodyText,
                        timestamp: timestamp
                    });

                    saveToLocalStorage();
                    messageInput.value = '';
                    renderMessages();
                    renderContacts();

                    showStatus("📱 Sent successfully!", "bg-green-950 text-green-400 border border-green-900");
                }, (err) => {
                    submitBtn.innerText = 'Send';
                    submitBtn.disabled = false;
                    showStatus("❌ Transmission error.", "bg-red-950 text-red-400 border border-red-900");
                    console.error(err);
                });
        });

        // Modal Action Configurations
        newChatBtn.addEventListener('click', () => { newChatModal.classList.replace('hidden', 'flex'); modalPhone.focus(); });
        modalClose.addEventListener('click', () => { newChatModal.classList.replace('flex', 'hidden'); modalPhone.value = ''; });
        
        modalCreate.addEventListener('click', () => {
            const phoneRaw = modalPhone.value.replace(/\D/g, ''); // Extract numbers only
            if (phoneRaw.length !== 10) {
                alert("Please enter a valid 10-digit number.");
                return;
            }

            // Instantiate empty message array if this is a newly created line item
            if (!appData[phoneRaw]) {
                appData[phoneRaw] = [];
                saveToLocalStorage();
            }

            newChatModal.classList.replace('flex', 'hidden');
            modalPhone.value = '';
            
            selectContact(phoneRaw);
        });

        // UI Utility Helper Functions
        function formatPhoneNumber(string) {
            const cleaned = ('' + string).replace(/\D/g, '');
            const match = cleaned.match(/^(\d{3})(\d{3})(\d{4})$/);
            if (match) {
                return `(${match[1]}) ${match[2]}-${match[3]}`;
            }
            return string;
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
        }

        function showStatus(text, classes) {
            statusMsg.textContent = text;
            statusMsg.className = `text-xs px-3 py-1 rounded block ${classes}`;
            setTimeout(() => { statusMsg.classList.add('hidden'); }, 4000);
        }

        // Close dropdown menus when clicking globally outside elements
        document.addEventListener('click', () => {
            document.querySelectorAll('.dropdown-menu').forEach(d => d.classList.add('hidden'));
        });

        // Initialize display lifecycle
        renderContacts();
    </script>
</body>
</html>
