<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube</title>
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Roboto', Arial, sans-serif;
            background-color: #0f0f0f;
            color: #fff;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        header {
            background-color: #0f0f0f;
            border-bottom: 1px solid #303030;
            display: flex;
            align-items: center;
            padding: 0 16px;
            height: 56px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }
        .logo {
            display: flex;
            align-items: center;
            margin-right: 40px;
        }
        .logo img {
            height: 24px;
        }
        .search-container {
            flex: 1;
            max-width: 640px;
            display: flex;
            margin: 0 40px;
        }
        .search-bar {
            flex: 1;
            height: 40px;
            background: #121212;
            border: 1px solid #303030;
            border-radius: 40px 0 0 40px;
            padding: 0 16px;
            color: #fff;
            font-size: 16px;
        }
        .search-btn {
            width: 65px;
            background: #222;
            border: 1px solid #303030;
            border-left: none;
            border-radius: 0 40px 40px 0;
            cursor: pointer;
        }
        .header-icons {
            display: flex;
            align-items: center;
            gap: 24px;
        }
        .header-icons i {
            font-size: 24px;
            cursor: pointer;
        }
        .sidebar {
            width: 240px;
            background: #0f0f0f;
            position: fixed;
            top: 56px;
            bottom: 0;
            overflow-y: auto;
            border-right: 1px solid #303030;
            padding-top: 12px;
        }
        .sidebar-item {
            display: flex;
            align-items: center;
            padding: 8px 24px;
            color: #aaa;
            cursor: pointer;
        }
        .sidebar-item:hover, .sidebar-item.active {
            background: #272727;
            color: #fff;
        }
        .main-content {
            margin-top: 56px;
            margin-left: 240px;
            padding: 20px;
            overflow-y: auto;
            flex: 1;
        }
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }
        .video-card {
            cursor: pointer;
        }
        .thumbnail {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 */
            background: #333;
            border-radius: 12px;
            overflow: hidden;
        }
        .thumbnail img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .duration {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 2px 6px;
            font-size: 12px;
            border-radius: 3px;
        }
        .video-info {
            display: flex;
            margin-top: 12px;
        }
        .channel-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #666;
            margin-right: 12px;
        }
        .video-details {
            flex: 1;
        }
        .video-title {
            font-size: 16px;
            line-height: 1.3;
            margin-bottom: 6px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .channel-name, .meta {
            font-size: 14px;
            color: #aaa;
        }
        #watch-page {
            display: none;
            flex-direction: row;
            gap: 24px;
            padding: 20px;
        }
        #player-container {
            flex: 1;
        }
        #video-player {
            width: 100%;
            aspect-ratio: 16 / 9;
        }
        .video-meta {
            margin-top: 16px;
        }
        .comments {
            margin-top: 32px;
        }
        a {
            color: inherit;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <span style="font-size: 28px; margin-right: 8px;">▶️</span>
            <span style="font-weight: bold; font-size: 20px;">YouTube</span>
        </div>
        <div class="search-container">
            <input type="text" id="search-input" class="search-bar" placeholder="Search" onkeypress="if(event.key === 'Enter') searchVideos()">
            <button class="search-btn" onclick="searchVideos()">🔍</button>
        </div>
        <div class="header-icons">
            <span>🎥</span>
            <span>🛎️</span>
            <span>👤</span>
        </div>
    </header>

    <nav class="sidebar">
        <div class="sidebar-item active" onclick="showHome()"><span style="margin-right: 24px;">🏠</span> Home</div>
        <div class="sidebar-item" onclick="alert('Trending coming soon')"><span style="margin-right: 24px;">🔥</span> Trending</div>
        <div class="sidebar-item" onclick="alert('Subscriptions coming soon')"><span style="margin-right: 24px;">📺</span> Subscriptions</div>
        <hr style="margin: 12px 24px; border-color: #303030;">
        <div class="sidebar-item"><span style="margin-right: 24px;">📚</span> Library</div>
        <div class="sidebar-item"><span style="margin-right: 24px;">🕒</span> History</div>
    </nav>

    <div id="home-page" class="main-content">
        <h2 style="margin-bottom: 20px;">Recommended</h2>
        <div id="video-grid" class="video-grid"></div>
    </div>

    <div id="watch-page" class="main-content">
        <div id="player-container">
            <div id="video-player"></div>
            <div class="video-meta">
                <h1 id="video-title" style="font-size: 20px;"></h1>
                <div style="display: flex; justify-content: space-between; margin: 16px 0;">
                    <div id="channel-info"></div>
                    <div>
                        <button onclick="likeVideo()">👍 Like</button>
                    </div>
                </div>
                <div id="video-description" style="background: #272727; padding: 16px; border-radius: 12px;"></div>
            </div>
            <div class="comments">
                <h3>Comments</h3>
                <p>Comments section (demo)</p>
            </div>
        </div>
        <div style="width: 400px;">
            <h3>Up next</h3>
            <div id="up-next" class="video-grid" style="grid-template-columns: 1fr;"></div>
        </div>
    </div>

    <script>
        // REPLACE WITH YOUR REAL YOUTUBE DATA API v3 KEY
        const API_KEY = 'AIzaSyA-prNvVFEqlhVDePlrmPd6RGC-JMpt04Q';

        let currentPlayer = null;
        let currentVideoId = null;

        window.onYouTubeIframeAPIReady = function() {
            console.log('YouTube Player API ready');
        };

        async function fetchVideos(query = '') {
            const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=20&type=video&q=${encodeURIComponent(query || 'popular')}&key=${API_KEY}`;
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('API error: ' + response.status);
                const data = await response.json();
                return data.items || [];
            } catch (e) {
                console.error(e);
                alert('Failed to fetch videos. Check your API key and internet connection.');
                return [];
            }
        }

        function displayVideos(videos, containerId = 'video-grid') {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            videos.forEach(video => {
                const videoId = video.id.videoId || video.id;
                const card = document.createElement('div');
                card.className = 'video-card';
                card.innerHTML = `
                    <div class="thumbnail">
                        <img src="${video.snippet.thumbnails.medium.url}" alt="${video.snippet.title}">
                        <div class="duration">4:20</div>
                    </div>
                    <div class="video-info">
                        <div class="channel-avatar"></div>
                        <div class="video-details">
                            <div class="video-title">${video.snippet.title}</div>
                            <div class="channel-name">${video.snippet.channelTitle}</div>
                            <div class="meta">1M views • ${new Date(video.snippet.publishedAt).toLocaleDateString()}</div>
                        </div>
                    </div>
                `;
                card.onclick = () => watchVideo(videoId, video.snippet);
                container.appendChild(card);
            });
        }

        async function searchVideos() {
            const query = document.getElementById('search-input').value.trim();
            const videos = await fetchVideos(query);
            displayVideos(videos);
            showHome();
        }

        function watchVideo(videoId, snippet) {
            currentVideoId = videoId;
            document.getElementById('home-page').style.display = 'none';
            const watchPage = document.getElementById('watch-page');
            watchPage.style.display = 'flex';

            if (currentPlayer) {
                currentPlayer.loadVideoById(videoId);
            } else {
                currentPlayer = new YT.Player('video-player', {
                    height: '100%',
                    width: '100%',
                    videoId: videoId,
                    playerVars: { 'autoplay': 1, 'rel': 0 }
                });
            }

            document.getElementById('video-title').textContent = snippet.title;
            document.getElementById('channel-info').innerHTML = `
                <div style="display: flex; align-items: center;">
                    <div style="width: 48px; height: 48px; border-radius: 50%; background: #666; margin-right: 12px;"></div>
                    <div>
                        <div>${snippet.channelTitle}</div>
                        <div style="color: #aaa; font-size: 14px;">1M subscribers</div>
                    </div>
                </div>
            `;
            document.getElementById('video-description').textContent = snippet.description || 'No description available.';

            fetchVideos(snippet.title).then(upNext => {
                displayVideos(upNext.slice(0, 5), 'up-next');
            });
        }

        function showHome() {
            document.getElementById('watch-page').style.display = 'none';
            document.getElementById('home-page').style.display = 'block';
        }

        function likeVideo() {
            alert('Liked! (demo feature)');
        }

        async function init() {
            if (API_KEY === 'YOUR_API_KEY_HERE') {
                alert('Please replace YOUR_API_KEY_HERE with your actual YouTube Data API v3 key!');
                return;
            }
            const videos = await fetchVideos('');
            displayVideos(videos);
        }

        window.onload = init;
    </script>
</body>
</html>
