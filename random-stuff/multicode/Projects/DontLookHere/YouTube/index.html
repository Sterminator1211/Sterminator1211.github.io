<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- API KEY MODAL -->
<div id="apiKeyModal" class="modal-overlay">
  <div class="modal">
    <svg class="yt-logo-icon" viewBox="0 0 90 20" width="90"><path d="M27.9727 3.12324C27.6435 1.89323 26.6768 0.926623 25.4468 0.597366C23.2197 2.24288e-07 14.285 0 14.285 0C14.285 0 5.35042 2.24288e-07 3.12323 0.597366C1.89323 0.926623 0.926623 1.89323 0.597366 3.12324C0 5.35042 0 10 0 10C0 10 0 14.6496 0.597366 16.8768C0.926623 18.1068 1.89323 19.0734 3.12323 19.4026C5.35042 20 14.285 20 14.285 20C14.285 20 23.2197 20 25.4468 19.4026C26.6768 19.0734 27.6435 18.1068 27.9727 16.8768C28.5701 14.6496 28.5701 10 28.5701 10C28.5701 10 28.5677 5.35042 27.9727 3.12324Z" fill="#FF0000"/><path d="M11.4253 14.2854L18.8477 10.0004L11.4253 5.71533V14.2854Z" fill="white"/></svg>
    <h2>Connect your YouTube API key</h2>
    <p>Paste your YouTube Data API v3 key below. It's stored only in your browser's local storage — never sent anywhere except directly to Google's API.</p>
    <input type="text" id="apiKeyInput" placeholder="AIzaSy...">
    <button id="apiKeySubmit">Save & continue</button>
    <a href="https://console.cloud.google.com/apis/credentials" target="_blank" rel="noopener">Don't have a key? Get one from Google Cloud Console →</a>
  </div>
</div>

<!-- HEADER -->
<header class="header">
  <div class="header-left">
    <button id="menuBtn" class="icon-btn" aria-label="Menu">
      <svg viewBox="0 0 24 24" width="24" height="24"><path d="M3 6h18v2H3V6zm0 5h18v2H3v-2zm0 5h18v2H3v-2z"/></svg>
    </button>
    <a href="#" class="logo" id="logoBtn">
      <svg viewBox="0 0 90 20" width="90"><path d="M27.9727 3.12324C27.6435 1.89323 26.6768 0.926623 25.4468 0.597366C23.2197 2.24288e-07 14.285 0 14.285 0C14.285 0 5.35042 2.24288e-07 3.12323 0.597366C1.89323 0.926623 0.926623 1.89323 0.597366 3.12324C0 5.35042 0 10 0 10C0 10 0 14.6496 0.597366 16.8768C0.926623 18.1068 1.89323 19.0734 3.12323 19.4026C5.35042 20 14.285 20 14.285 20C14.285 20 23.2197 20 25.4468 19.4026C26.6768 19.0734 27.6435 18.1068 27.9727 16.8768C28.5701 14.6496 28.5701 10 28.5701 10C28.5701 10 28.5677 5.35042 27.9727 3.12324Z" fill="#FF0000"/><path d="M11.4253 14.2854L18.8477 10.0004L11.4253 5.71533V14.2854Z" fill="white"/></svg>
      <span>YouTube</span>
    </a>
  </div>

  <div class="header-center">
    <form id="searchForm" class="search-form">
      <input type="text" id="searchInput" class="search-input" placeholder="Search" autocomplete="off">
      <button type="submit" class="search-btn" aria-label="Search">
        <svg viewBox="0 0 24 24" width="20" height="20"><path d="M21 20.3l-5.4-5.4c1-1.2 1.6-2.8 1.6-4.5C17.2 6.1 13.9 3 9.9 3S2.6 6.2 2.6 10.2s3.2 7.2 7.2 7.2c1.7 0 3.3-.6 4.5-1.6l5.4 5.4.9-.9zM4.1 10.4c0-3.2 2.6-5.7 5.7-5.7s5.7 2.6 5.7 5.7-2.6 5.7-5.7 5.7-5.7-2.5-5.7-5.7z"/></svg>
      </button>
    </form>
  </div>

  <div class="header-right">
    <button id="keyBtn" class="icon-btn" title="API key settings" aria-label="API key settings">
      <svg viewBox="0 0 24 24" width="22" height="22"><path d="M12.9 2c-.94 0-1.77.6-2.06 1.5l-.24.75c-.13.4-.44.72-.83.86-.4.15-.85.1-1.2-.14l-.65-.44a2.2 2.2 0 0 0-2.7.28L4.1 5.9a2.2 2.2 0 0 0-.27 2.7l.43.65c.24.35.3.8.15 1.2-.14.4-.46.7-.86.83l-.75.24A2.2 2.2 0 0 0 1.3 13.5v1.02c0 .94.6 1.77 1.5 2.06l.75.24c.4.13.72.44.86.83.15.4.1.85-.14 1.2l-.43.66a2.2 2.2 0 0 0 .27 2.7l.72.72a2.2 2.2 0 0 0 2.7.27l.65-.43c.35-.24.8-.3 1.2-.15.4.14.7.46.83.86l.24.75c.29.9 1.12 1.5 2.06 1.5h1.02c.94 0 1.77-.6 2.06-1.5l.24-.75c.13-.4.44-.72.83-.86.4-.15.85-.1 1.2.14l.66.44c.85.57 2 .46 2.7-.27l.72-.72a2.2 2.2 0 0 0 .27-2.7l-.43-.66c-.24-.35-.3-.8-.15-1.2.14-.4.46-.7.86-.83l.75-.24c.9-.29 1.5-1.12 1.5-2.06V13.5c0-.94-.6-1.77-1.5-2.06l-.75-.24c-.4-.13-.72-.44-.86-.83-.15-.4-.1-.85.14-1.2l.44-.65a2.2 2.2 0 0 0-.28-2.7l-.72-.72a2.2 2.2 0 0 0-2.7-.28l-.65.44c-.35.24-.8.3-1.2.15-.4-.14-.7-.46-.83-.86l-.24-.75A2.2 2.2 0 0 0 14.02 2H12.9zm.55 8a3.5 3.5 0 1 1 0 7 3.5 3.5 0 0 1 0-7z"/></svg>
    </button>
  </div>
</header>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <nav class="sidebar-nav">
    <a href="#" class="sidebar-link active" data-view="home">
      <svg viewBox="0 0 24 24" width="22" height="22"><path d="M12 3.1L2 11h3v9h6v-6h2v6h6v-9h3L12 3.1z"/></svg>
      <span>Home</span>
    </a>
    <a href="#" class="sidebar-link" data-view="trending">
      <svg viewBox="0 0 24 24" width="22" height="22"><path d="M13 2v8h8L11 22v-8H3l10-12z"/></svg>
      <span>Trending</span>
    </a>
  </nav>
  <hr class="sidebar-divider">
  <div class="sidebar-section-title">Explore</div>
  <nav class="sidebar-nav" id="categoryNav"></nav>
</aside>

<!-- MAIN -->
<main class="main">
  <div class="chips" id="chips"></div>

  <div id="homeView">
    <div class="video-grid" id="videoGrid"></div>
    <div class="loader" id="loader">Loading…</div>
  </div>

  <div id="watchView" class="watch-view" style="display:none;">
    <div class="watch-left">
      <div class="player-wrap">
        <iframe id="player" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>
      </div>
      <h1 class="watch-title" id="watchTitle"></h1>
      <div class="watch-meta">
        <div class="channel-info">
          <img id="channelThumb" class="channel-thumb" alt="">
          <div>
            <div class="channel-name" id="channelName"></div>
            <div class="channel-subs" id="channelSubs"></div>
          </div>
        </div>
        <div class="watch-stats" id="watchStats"></div>
      </div>
      <div class="description-box" id="descriptionBox"></div>
    </div>
    <div class="watch-right" id="relatedVideos"></div>
  </div>
</main>

<script src="app.js"></script>
</body>
</html>
