<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Plans</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Netflix+Sans:wght@400;500;700&display=swap');
        
        :root { --netflix-red: #e50914; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Netflix Sans', Arial, sans-serif;
            background-color: #141414;
            color: #ffffff;
            line-height: 1.4;
        }
        
        .header {
            display: flex;
            align-items: center;
            padding: 20px 50px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%);
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
        }
        
        .logo {
            color: var(--netflix-red);
            font-size: 2.2rem;
            font-weight: 900;
            text-decoration: none;
        }
        
        .nav {
            display: flex;
            align-items: center;
            gap: 25px;
            margin-left: 50px;
        }
        
        .nav a {
            color: #ffffff;
            text-decoration: none;
            font-size: 1.05rem;
        }
        
        .nav a.active { font-weight: 700; }
        
        .sign-in {
            margin-left: auto;
            padding: 8px 18px;
            background: transparent;
            color: white;
            border: 1px solid #ffffff;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding-top: 140px;
            padding-bottom: 60px;
        }
        
        .plans-header {
            text-align: center;
            margin-bottom: 50px;
        }
        
        .plans-header h1 {
            font-size: 2.8rem;
            margin-bottom: 12px;
        }
        
        .plans {
            display: flex;
            gap: 24px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .plan-card {
            background: linear-gradient(135deg, #2a2a2a 0%, #1f1f1f 100%);
            border-radius: 8px;
            width: 340px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
        }
        
        .plan-card:hover {
            transform: scale(1.04);
            box-shadow: 0 10px 30px rgba(229, 9, 20, 0.3);
        }
        
        .plan-header {
            padding: 32px 28px 20px;
            text-align: center;
        }
        
        .plan-name {
            font-size: 1.85rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .plan-res {
            font-size: 1.15rem;
            color: #b3b3b3;
            margin-bottom: 28px;
        }
        
        .plan-features {
            padding: 0 28px 32px;
            min-height: 280px;
        }
        
        .feature {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            margin-bottom: 16px;
            font-size: 1.02rem;
        }
        
        .feature::before {
            content: '✓';
            color: #46d369;
            font-weight: bold;
            font-size: 1.3rem;
            flex-shrink: 0;
            margin-top: -4px;
        }
        
        .plan-price {
            padding: 24px 28px;
            text-align: center;
            border-top: 1px solid #333;
        }
        
        .price {
            font-size: 2.1rem;
            font-weight: 700;
        }
        
        .choose-btn {
            display: block;
            width: 90%;
            margin: 20px auto 28px;
            padding: 16px;
            background: #e50914;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
        }
        
        .choose-btn:hover { background: #f40612; }
        
        .footer-text {
            text-align: center;
            margin-top: 60px;
            font-size: 0.95rem;
            color: #b3b3b3;
            max-width: 860px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.6;
        }
        
        @media (max-width: 1024px) {
            .plans { flex-direction: column; align-items: center; }
            .plan-card { width: 90%; max-width: 380px; }
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="#" class="logo">NETFLIX</a>
        <div class="nav">
            <a href="#">Trending Now</a>
            <a href="#" class="active">Plans</a>
        </div>
        <button class="sign-in">Sign In</button>
    </header>

    <div class="container">
        <div class="plans-header">
            <h1>Choose the plan that's right for you</h1>
        </div>
        
        <div class="plans" id="plans-container">
            <!-- Plans loaded here -->
        </div>
        
        <div class="footer-text">
            Only people who live with you may use your account. Add 1 extra member with Standard or up to 2 with Premium. 
            Learn more at Netflix.com/Pricing. Live entertainment is included with any Netflix plan and contains ads.
        </div>
    </div>

    <script>
        const defaultPlans = {
            "plans": [
                {
                    "name": "Premium",
                    "resolution": "8K + HDR",
                    "price": "$15.62/mo",
                    "features": [
                        "Immersive sound (spatial audio)",
                        "10 devices for your household to watch at the same time",
                        "No ads"
                    ]
                },
                {
                    "name": "Silver",
                    "resolution": "4K",
                    "price": "$12.93/mo",
                    "features": [
                        "6 devices for your household to watch at the same time",
                        "No ads"
                    ]
                },
                {
                    "name": "Standard",
                    "resolution": "1080p",
                    "price": "$6.82/mo",
                    "features": [
                        "3 devices for your household to watch at the same time",
                        "Ad breaks every 10-20 Minutes"
                    ]
                }
            ]
        };

        async function loadPlans() {
            let data = defaultPlans;
            
            try {
                const response = await fetch('plans.json');
                if (response.ok) {
                    data = await response.json();
                    console.log('✅ Loaded plans from plans.json');
                } else {
                    console.warn('plans.json not found, using default data');
                }
            } catch (e) {
                console.warn('Could not load plans.json (local file restriction). Using default data.', e);
            }
            
            const container = document.getElementById('plans-container');
            container.innerHTML = '';
            
            data.plans.forEach(plan => {
                const cardHTML = `
                    <div class="plan-card">
                        <div class="plan-header">
                            <div class="plan-name">${plan.name}</div>
                            <div class="plan-res">${plan.resolution}</div>
                        </div>
                        <div class="plan-features">
                            ${plan.features.map(f => `<div class="feature">${f}</div>`).join('')}
                        </div>
                        <div class="plan-price">
                            <div class="price">${plan.price}</div>
                        </div>
                        <button class="choose-btn" onclick="alert('Selected: ${plan.name} - ${plan.price}')">
                            Choose Plan
                        </button>
                    </div>
                `;
                container.innerHTML += cardHTML;
            });
        }

        window.onload = loadPlans;
    </script>
</body>
</html>
