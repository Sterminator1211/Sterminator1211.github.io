<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spatial A&V Plans</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Netflix+Sans:wght@400;500;700&display=swap');
        
        :root { --netflix-red: #e50914; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Netflix Sans', Arial, sans-serif;
            background-color: #141414;
            color: #ffffff;
            line-height: 1.4;
        }
        
        .header {
            display: flex;
            align-items: center;
            padding: 20px 50px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%);
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
        }
        
        .logo {
            color: var(--netflix-red);
            font-size: 2.2rem;
            font-weight: 900;
            text-decoration: none;
        }
        
        .main-content {
            padding-top: 140px;
            padding-bottom: 80px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .plans-header h1 { font-size: 2.8rem; margin-bottom: 12px; text-align: center; }
        .plans-section { margin-bottom: 60px; }
        .plans-section h2 { text-align: center; font-size: 1.8rem; margin-bottom: 30px; color: #b3b3b3; }
        
        .plans {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            justify-content: center;
        }
        
        .plan-card {
            background: linear-gradient(135deg, #2a2a2a 0%, #1f1f1f 100%);
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
        }
        
        .plan-card:hover {
            transform: scale(1.04);
            box-shadow: 0 10px 30px rgba(229, 9, 20, 0.3);
        }
        
        .plan-header { padding: 32px 28px 20px; text-align: center; }
        .plan-name { font-size: 1.85rem; font-weight: 700; margin-bottom: 8px; }
        .plan-res { font-size: 1.15rem; color: #b3b3b3; margin-bottom: 28px; }
        
        .plan-features { padding: 0 28px 32px; flex-grow: 1; }
        .feature { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 16px; font-size: 1.02rem; }
        .feature::before { content: '✓'; color: #46d369; font-weight: bold; font-size: 1.3rem; flex-shrink: 0; margin-top: -4px; }
        
        .plan-price { padding: 24px 28px; text-align: center; border-top: 1px solid #333; }
        .price { font-size: 2.1rem; font-weight: 700; }

        .choose-btn {
            display: block;
            width: 90%;
            margin: 20px auto 28px;
            padding: 16px;
            background: #e50914;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
        }

        .phone-page, .otp-page {
            max-width: 520px;
            margin: 0 auto;
            text-align: center;
        }

        .phone-page h1, .otp-page h1 { font-size: 2.4rem; margin-bottom: 12px; }
        .phone-page p, .otp-page p { color: #b3b3b3; margin-bottom: 40px; font-size: 1.1rem; }

        .phone-display, .otp-display {
            background: #222;
            border: 2px solid #444;
            border-radius: 8px;
            padding: 24px;
            font-size: 2.2rem;
            font-weight: 500;
            letter-spacing: 4px;
            margin-bottom: 40px;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: monospace;
        }

        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 50px;
        }

        .key-btn {
            background: #333;
            color: white;
            border: none;
            border-radius: 12px;
            height: 90px;
            font-size: 2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .key-btn:hover { background: #555; transform: scale(1.05); }
        .key-btn:active { background: #e50914; }

        .selected-plan-info {
            background: #1f1f1f;
            border-radius: 8px;
            padding: 20px;
            margin: 40px 0;
            text-align: left;
        }

        .nav-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 50px;
        }

        .nav-btn {
            padding: 16px 32px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            min-width: 160px;
        }

        .btn-back {
            background: transparent;
            border: 2px solid #666;
            color: #fff;
        }

        .btn-continue {
            background: #e50914;
            border: none;
            color: white;
        }

        .btn-continue:disabled {
            background: #555;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="#" class="logo">SpatialAV</a>
    </header>

    <!-- Plans Page -->
    <div id="plans-page" class="main-content">
        <div class="container">
            <div class="plans-header">
                <h1>Choose the plan that's right for you</h1>
            </div>
            
            <div class="plans-section">
                <h2>Audio & Video Plans</h2>
                <div class="plans" id="plans-row1"></div>
            </div>
            
            <div class="separator-bar" style="height:4px;background:linear-gradient(to right, transparent, #e50914, transparent);margin:40px auto;max-width:800px;border-radius:2px;"></div>
            
            <div class="plans-section">
                <h2>Audio Plans</h2>
                <div class="plans" id="plans-row2"></div>
            </div>
        </div>
    </div>

    <!-- Phone Entry Page -->
    <div id="phone-page" class="main-content" style="display: none;">
        <div class="container phone-page">
            <h1>Enter your phone number</h1>
            <p>We'll send a verification code to your registered email</p>
            
            <div id="phone-display" class="phone-display">+1 (___) ___-____</div>
            
            <div class="keypad" id="keypad"></div>

            <div class="selected-plan-info">
                <h3 id="selected-plan-name"></h3>
                <p id="selected-plan-details"></p>
            </div>

            <div class="nav-buttons">
                <button class="nav-btn btn-back" onclick="goBackToPlans()">Back</button>
                <button id="continue-btn" class="nav-btn btn-continue" onclick="continueToOtp()" disabled>Continue</button>
            </div>
        </div>
    </div>

    <!-- OTP Page -->
    <div id="otp-page" class="main-content" style="display: none;">
        <div class="container otp-page">
            <h1>Verification Code</h1>
            <p id="otp-instruction">Enter the 6-digit code sent to your email</p>
            
            <div id="otp-display" class="otp-display">______</div>
            
            <div class="keypad" id="otp-keypad"></div>

            <div class="selected-plan-info">
                <h3 id="otp-plan-name"></h3>
                <p id="otp-plan-details"></p>
            </div>

            <div class="nav-buttons">
                <button class="nav-btn btn-back" onclick="goBackToPhone()">Back</button>
                <button id="verify-btn" class="nav-btn btn-continue" onclick="verifyOtp()" disabled>Verify</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== CONFIG & OTP LOGIC ====================
        let TEM_EMAIL = null;
        let enteredOtp = "";
        let generatedOtp = null;
        let selectedPlanRef = null;

        async function loadTemEmail() {
            try {
                const res = await fetch('/api/get-email');
                const data = await res.json();
                if (data.email) {
                    TEM_EMAIL = data.email;
                    console.log("✅ TEM_EMAIL loaded successfully:", TEM_EMAIL);
                } else {
                    console.error("TEMADDRESS not found in environment variables");
                }
            } catch (e) {
                console.error("Failed to load TEM_EMAIL", e);
            }
        }

        function generateRandomOtp() {
            return Math.floor(100000 + Math.random() * 900000).toString();
        }

        async function sendOtp(otp) {
            if (!TEM_EMAIL) {
                alert("Email service not configured. Please refresh the page.");
                return false;
            }

            try {
                const response = await fetch('/api/send-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ otp: otp, to: TEM_EMAIL })
                });
                return response.ok;
            } catch (err) {
                console.error(err);
                alert("Failed to send verification code.");
                return false;
            }
        }

        function showOtpPage(plan) {
            selectedPlanRef = plan;
            document.getElementById('phone-page').style.display = 'none';
            document.getElementById('otp-page').style.display = 'block';
            
            document.getElementById('otp-plan-name').textContent = `${plan.name} — ${plan.price}`;
            document.getElementById('otp-plan-details').innerHTML = `${plan.resolution}<br>${plan.features.join('<br>')}`;
            
            enteredOtp = "";
            generatedOtp = generateRandomOtp();
            
            sendOtp(generatedOtp).then(success => {
                if (success) {
                    document.getElementById('otp-instruction').innerHTML = `Enter the 6-digit code sent to <strong>${TEM_EMAIL}</strong>`;
                }
            });
            
            renderOtpKeypad();
            updateOtpDisplay();
        }

        function renderOtpKeypad() {
            const keypad = document.getElementById('otp-keypad');
            keypad.innerHTML = '';
            for (let i = 0; i <= 9; i++) {
                const btn = document.createElement('button');
                btn.className = 'key-btn';
                btn.textContent = i;
                btn.onclick = () => addOtpDigit(i);
                keypad.appendChild(btn);
            }
            const backBtn = document.createElement('button');
            backBtn.className = 'key-btn';
            backBtn.textContent = '⌫';
            backBtn.style.gridColumn = 'span 2';
            backBtn.onclick = backspaceOtp;
            keypad.appendChild(backBtn);
        }

        function addOtpDigit(digit) {
            if (enteredOtp.length < 6) {
                enteredOtp += digit;
                updateOtpDisplay();
            }
        }

        function backspaceOtp() {
            enteredOtp = enteredOtp.slice(0, -1);
            updateOtpDisplay();
        }

        function updateOtpDisplay() {
            document.getElementById('otp-display').textContent = enteredOtp.padEnd(6, '_');
            document.getElementById('verify-btn').disabled = enteredOtp.length < 6;
        }

        function verifyOtp() {
            if (enteredOtp === generatedOtp) {
                alert(`✅ Success!\n\nPlan: ${selectedPlanRef.name}\nVerification completed!`);
            } else {
                alert("❌ Incorrect code. Please try again.");
                enteredOtp = "";
                updateOtpDisplay();
            }
        }

        // ==================== MAIN APP ====================
        let selectedPlan = null;
        let phoneNumber = "";

        async function loadPlans() {
            let data = { "plans": [] };
            try {
                const response = await fetch('plans.json');
                if (response.ok) data = await response.json();
            } catch (e) {
                console.warn('Using fallback plans');
            }

            if (data.plans.length === 0) {
                data = {
                    "plans": [
                        { "name": "Premium", "resolution": "8K + HDR 160fps", "price": "$15.62/mo", "row": 1, "features": ["Immersive sound (spatial audio)", "10 devices", "No ads"] },
                        { "name": "Silver", "resolution": "4K 120fps", "price": "$12.93/mo", "row": 1, "features": ["6 devices", "No ads"] },
                        { "name": "Standard", "resolution": "1080p 60fps", "price": "$6.82/mo", "row": 2, "features": ["3 devices", "No ads"] },
                        { "name": "Basic", "resolution": "1080p 30fps", "price": "$4.99/mo", "row": 2, "features": ["2 devices", "Ad breaks"] }
                    ]
                };
            }
            
            renderPlans(data.plans.filter(p => p.row === 1), 'plans-row1');
            renderPlans(data.plans.filter(p => p.row === 2), 'plans-row2');
        }

        function renderPlans(plans, containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            plans.forEach(plan => {
                const card = document.createElement('div');
                card.className = 'plan-card';
                card.innerHTML = `
                    <div class="plan-header">
                        <div class="plan-name">${plan.name}</div>
                        <div class="plan-res">${plan.resolution}</div>
                    </div>
                    <div class="plan-features">
                        ${plan.features.map(f => `<div class="feature">${f}</div>`).join('')}
                    </div>
                    <div class="plan-price">
                        <div class="price">${plan.price}</div>
                    </div>
                    <button class="choose-btn">Choose Plan</button>
                `;
                card.querySelector('.choose-btn').addEventListener('click', () => selectPlan(plan));
                container.appendChild(card);
            });
        }

        function selectPlan(plan) {
            selectedPlan = plan;
            phoneNumber = "";
            document.getElementById('plans-page').style.display = 'none';
            document.getElementById('phone-page').style.display = 'block';
            
            document.getElementById('selected-plan-name').textContent = `${plan.name} — ${plan.price}`;
            document.getElementById('selected-plan-details').innerHTML = `${plan.resolution}<br>${plan.features.join('<br>')}`;
            
            renderKeypad();
            updatePhoneDisplay();
        }

        function renderKeypad() {
            const keypad = document.getElementById('keypad');
            keypad.innerHTML = '';
            for (let i = 1; i <= 9; i++) {
                const btn = document.createElement('button');
                btn.className = 'key-btn';
                btn.textContent = i;
                btn.onclick = () => addDigit(i);
                keypad.appendChild(btn);
            }
            const zeroBtn = document.createElement('button');
            zeroBtn.className = 'key-btn';
            zeroBtn.textContent = '0';
            zeroBtn.style.gridColumn = 'span 2';
            zeroBtn.onclick = () => addDigit(0);
            keypad.appendChild(zeroBtn);
            
            const backBtn = document.createElement('button');
            backBtn.className = 'key-btn';
            backBtn.textContent = '⌫';
            backBtn.onclick = backspace;
            keypad.appendChild(backBtn);
        }

        function addDigit(digit) {
            if (phoneNumber.length < 10) {
                phoneNumber += digit;
                updatePhoneDisplay();
            }
        }

        function backspace() {
            phoneNumber = phoneNumber.slice(0, -1);
            updatePhoneDisplay();
        }

        function updatePhoneDisplay() {
            let display = "+1 ";
            const num = phoneNumber;
            if (num.length === 0) {
                display += "(___) ___-____";
            } else {
                display += `(${num.substring(0,3)}) ${num.substring(3,6)}-${num.substring(6)}`;
                if (num.length < 10) display += "_".repeat(10 - num.length);
            }
            document.getElementById('phone-display').textContent = display;
            document.getElementById('continue-btn').disabled = phoneNumber.length < 10;
        }

        function goBackToPlans() {
            document.getElementById('phone-page').style.display = 'none';
            document.getElementById('plans-page').style.display = 'block';
        }

        function goBackToPhone() {
            document.getElementById('otp-page').style.display = 'none';
            document.getElementById('phone-page').style.display = 'block';
        }

        function continueToOtp() {
            if (selectedPlan) showOtpPage(selectedPlan);
        }

        // Initialize
        window.addEventListener('load', async () => {
            await loadTemEmail();
            loadPlans();
        });
    </script>
</body>
</html>
