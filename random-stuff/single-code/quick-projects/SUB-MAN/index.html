<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscription Manager</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            margin: 20px;
            background-color: #f9f9f9;
            color: #333;
        }
        h1 {
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }
        h2 {
            color: #34495e;
            margin-top: 30px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
            background: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            border-radius: 5px;
            overflow: hidden;
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
        }
        th {
            background-color: #3498db;
            color: white;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 0.5px;
        }
        tr:nth-child(even) {
            background-color: #f2f2f2;
        }
        tr:hover {
            background-color: #eaeded;
        }
        .price {
            font-weight: bold;
            color: #27ae60;
        }
        .error {
            color: #c0392b;
            font-weight: bold;
        }
        small {
            color: #7f8c8d;
            display: block;
            font-weight: normal;
        }
    </style>
</head>
<body>

    <h1>Subscription Dashboard</h1>

    <h2>1. Paid Subscriptions</h2>
    <table>
        <thead>
            <tr>
                <th>Subscription Plan</th>
                <th>Standard Monthly Tier</th>
                <th>Features Included</th>
            </tr>
        </thead>
        <tbody id="paid-subs-tbody">
            <tr>
                <td colspan="3">Loading subscriptions...</td>
            </tr>
        </tbody>
    </table>

    <hr>

    <h2>2. Member Billing & Subscriptions</h2>
    <table>
        <thead>
            <tr>
                <th>Subscriber Name</th>
                <th>Active Subscription</th>
                <th>Amount Paid (Discounts Applied)</th>
            </tr>
        </thead>
        <tbody id="member-billing-tbody">
            <tr>
                <td colspan="3">Loading member billing data...</td>
            </tr>
        </tbody>
    </table>

    <script>
        // 1. Fetch Paid Subscriptions
        fetch('paid_subs.json')
            .then(response => {
                if (!response.ok) throw new Error('Could not load paid subscriptions');
                return response.json();
            })
            .then(data => {
                const tbody = document.getElementById('paid-subs-tbody');
                tbody.innerHTML = ''; 

                data.forEach(sub => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td><strong>${sub.name}</strong></td>
                        <td class="price">${sub.price}</td>
                        <td>${sub.features}</td>
                    `;
                    tbody.appendChild(row);
                });
            })
            .catch(error => {
                console.error(error);
                document.getElementById('paid-subs-tbody').innerHTML = 
                    `<tr><td colspan="3" class="error">Error loading subscription data.</td></tr>`;
            });

        // 2. Fetch Member Billing Data
        fetch('member_billing_subs.json')
            .then(response => {
                if (!response.ok) throw new Error('Could not load member billing data');
                return response.json();
            })
            .then(data => {
                const tbody = document.getElementById('member-billing-tbody');
                tbody.innerHTML = ''; 

                data.forEach(member => {
                    const row = document.createElement('tr');
                    
                    // Check if there is a note (like a discount) to append
                    const noteSpan = member.note ? `<small>(${member.note})</small>` : '';

                    row.innerHTML = `
                        <td>${member.name}</td>
                        <td>${member.subscription}</td>
                        <td class="price">${member.amountPaid} ${noteSpan}</td>
                    `;
                    tbody.appendChild(row);
                });
            })
            .catch(error => {
                console.error(error);
                document.getElementById('member-billing-tbody').innerHTML = 
                    `<tr><td colspan="3" class="error">Error loading member data.</td></tr>`;
            });
    </script>
</body>
</html>
