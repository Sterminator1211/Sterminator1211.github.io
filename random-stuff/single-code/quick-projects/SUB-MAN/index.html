<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Member Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white p-8">
  <div class="max-w-6xl mx-auto">
    <h1 class="text-4xl font-bold mb-2">Member Manager</h1>
    <p class="text-zinc-400 mb-8">Changes can be saved directly to GitHub</p>

    <div class="grid grid-cols-2 gap-8">
      <div>
        <h2 class="text-2xl mb-4">Members</h2>
        <button onclick="addMember()" class="bg-blue-600 px-4 py-2 rounded mb-4">+ Add</button>
        <div id="members-list"></div>
      </div>

      <div>
        <h2 class="text-2xl mb-4">Services</h2>
        <button onclick="addService()" class="bg-blue-600 px-4 py-2 rounded mb-4">+ Add</button>
        <div id="services-list"></div>
      </div>
    </div>

    <div class="mt-8">
      <button onclick="saveToGitHub()" class="bg-green-600 px-6 py-3 rounded-xl font-bold text-lg">
        💾 Save All Changes to GitHub
      </button>
    </div>
  </div>

  <script>
    let members = [];
    let services = [];

    async function loadData() {
      members = await fetch('/members.json').then(r => r.json()).catch(() => []);
      services = await fetch('/subs.json').then(r => r.json()).catch(() => []);
      render();
    }

    function render() {
      document.getElementById('members-list').innerHTML = members.map((m,i) => `
        <div class="bg-zinc-900 p-4 rounded mb-3">
          <strong>${m.name}</strong><br>
          Sub: ${m.subscription} | Paying: $${m.amount}
          <button onclick="editMember(${i})" class="ml-4 text-blue-400">Edit</button>
        </div>
      `).join('');

      document.getElementById('services-list').innerHTML = services.map((s,i) => `
        <div class="bg-zinc-900 p-4 rounded mb-3">
          ${s.name} - $${s.price}
          <button onclick="editService(${i})" class="ml-4 text-blue-400">Edit</button>
        </div>
      `).join('');
    }

    async function saveToGitHub() {
      const token = prompt("Enter your GitHub token (for this session):");
      if (!token) return;

      // Save members
      await fetch('/api/update', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          file: 'members.json',
          content: members,
          message: 'Update members'
        })
      });

      // Save services
      await fetch('/api/update', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          file: 'subs.json',
          content: services,
          message: 'Update services'
        })
      });

      alert("✅ Saved to GitHub!");
      location.reload();
    }

    // Add your CRUD functions here (addMember, editMember, etc.)
    loadData();
  </script>
</body>
</html>
