<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
        
        :root {
            --dr-pepper-red: #C8102E;
            --royal-blue: #4169E1;
            --royal-blue-dark: #2C4E9C;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--dr-pepper-red);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 10px;
        }

        header { text-align: center; margin-bottom: 40px; width: 100%; max-width: 800px; }
        h1 { font-size: 3.5rem; font-weight: 700; margin-bottom: 10px; text-shadow: 0 4px 8px rgba(0,0,0,0.3); letter-spacing: -2px; }
        .subtitle { font-size: 1.3rem; opacity: 0.95; }

        /* Clickable "Directories" word */
        .directories-toggle {
            cursor: pointer;
            transition: opacity 0.2s ease;
        }
        .directories-toggle:hover { opacity: 0.75; }
        .directories-toggle.expanded {
            font-weight: 700;
        }

        .mode-indicator {
            font-size: 0.85rem;
            opacity: 0.8;
            margin-top: 6px;
            min-height: 1.2em;
        }
        
        .container {
            width: 100%;
            max-width: 720px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 30px 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }
        
        .buttons-container { display: flex; flex-direction: column; gap: 16px; }

        .button-wrapper {
            position: relative;
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
            border: 2px solid var(--royal-blue-dark);
            background-color: var(--royal-blue);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.25);
        }

        .button-wrapper:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.3);
        }

        .button-wrapper.extra {
            border-color: rgba(255, 255, 255, 0.6);
        }

        .main-btn, .sub-link {
            display: block;
            width: 100%;
            padding: 22px 28px;
            color: white;
            font-size: 1.35rem;
            font-weight: 600;
            text-align: left;
            text-decoration: none;
            cursor: pointer;
            border: none;
            background: none;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        .has-sub::after {
            content: ' ▾';
            float: right;
            opacity: 0.7;
        }

        /* --- Active Header State --- */
        .button-wrapper.active .main-btn {
            padding: 10px 28px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            background-color: rgba(0, 0, 0, 0.25);
            cursor: default;
            opacity: 0.9;
        }

        .button-wrapper.active .has-sub::after {
            display: none;
        }

        .sub-links-container {
            display: none;
            flex-direction: row;
            background-color: var(--royal-blue-dark);
        }

        .button-wrapper.active .sub-links-container {
            display: flex;
        }

        .sub-link {
            flex: 1;
            font-size: 1.05rem;
            padding: 20px 10px;
            text-align: center;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sub-link:last-child { border-right: none; }
        .sub-link:hover { background-color: rgba(255, 255, 255, 0.1); }

        .loading { text-align: center; padding: 40px; font-size: 1.2rem; opacity: 0.9; }
        
        @media (max-width: 600px) {
            h1 { font-size: 2.8rem; }
            .sub-link { font-size: 0.85rem; padding: 15px 5px; }
        }
    </style>
</head>
<body>
    <header>
        <h1>Homepage</h1>
        <p class="subtitle">Quick Links <span id="directoriesToggle" class="directories-toggle">Directories</span></p>
        <p id="modeIndicator" class="mode-indicator"></p>
    </header>
    
    <div class="container">
        <div id="buttons-container" class="buttons-container"></div>
        <div id="loading" class="loading">Loading directories...</div>
    </div>

    <script>
        let baseDirectories = null;   // contents of directories.json
        let extraDirectories = null;  // contents of h-directories.json (fetched lazily)
        let showExtra = false;        // current view state

        const container = document.getElementById('buttons-container');
        const loading = document.getElementById('loading');
        const toggleEl = document.getElementById('directoriesToggle');
        const modeIndicator = document.getElementById('modeIndicator');

        function renderDirectories(baseList, extraList) {
            container.innerHTML = '';

            const renderList = (list, isExtra) => {
                list.forEach(([title, data]) => {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'button-wrapper' + (isExtra ? ' extra' : '');

                    // If data is a string, it's a standard link
                    if (typeof data === 'string') {
                        const link = document.createElement('a');
                        link.href = data;
                        link.className = 'main-btn';
                        link.textContent = title;
                        link.target = '_blank';
                        link.rel = 'noopener noreferrer';
                        wrapper.appendChild(link);
                    }
                    // If data is an object (Curly Brackets {}), it's a multi-link
                    else {
                        const mainBtn = document.createElement('button');
                        mainBtn.className = 'main-btn has-sub';
                        mainBtn.textContent = title;

                        const subContainer = document.createElement('div');
                        subContainer.className = 'sub-links-container';

                        Object.entries(data).forEach(([subTitle, url]) => {
                            const subLink = document.createElement('a');
                            subLink.href = url;
                            subLink.className = 'sub-link';
                            subLink.textContent = subTitle;
                            subLink.target = '_blank';
                            subLink.rel = 'noopener noreferrer';
                            subContainer.appendChild(subLink);
                        });

                        mainBtn.onclick = () => wrapper.classList.add('active');

                        wrapper.appendChild(mainBtn);
                        wrapper.appendChild(subContainer);
                    }

                    container.appendChild(wrapper);
                });
            };

            renderList(baseList, false);
            if (extraList) {
                renderList(extraList, true);
            }
        }

        function updateModeIndicator() {
            modeIndicator.textContent = showExtra
                ? '(showing expanded list — click "Directories" to collapse)'
                : '';
            toggleEl.classList.toggle('expanded', showExtra);
        }

        async function loadBaseDirectories() {
            const response = await fetch('directories.json');
            if (!response.ok) throw new Error('Failed to load directories.json');
            return response.json();
        }

        async function loadExtraDirectories() {
            const response = await fetch('h-directories.json');
            if (!response.ok) throw new Error('Failed to load h-directories.json');
            return response.json();
        }

        async function init() {
            try {
                baseDirectories = await loadBaseDirectories();
                loading.style.display = 'none';
                renderDirectories(baseDirectories, null);
            } catch (error) {
                loading.innerHTML = `<strong>Error loading directories.json</strong>`;
                return;
            }

            toggleEl.addEventListener('click', async () => {
                showExtra = !showExtra;

                if (showExtra) {
                    // Lazily fetch the extra json only once
                    if (extraDirectories === null) {
                        toggleEl.style.opacity = '0.5';
                        try {
                            extraDirectories = await loadExtraDirectories();
                        } catch (error) {
                            extraDirectories = [];
                            modeIndicator.textContent = 'Error loading h-directories.json';
                            toggleEl.style.opacity = '1';
                            showExtra = false;
                            return;
                        }
                        toggleEl.style.opacity = '1';
                    }
                    renderDirectories(baseDirectories, extraDirectories);
                } else {
                    renderDirectories(baseDirectories, null);
                }

                updateModeIndicator();
            });
        }

        window.addEventListener('load', init);
    </script>
</body>
</html>
