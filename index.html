<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
        
        :root {
            --dr-pepper-red: #C8102E;
            --royal-blue: #4169E1;
            --royal-blue-dark: #2C4E9C;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--dr-pepper-red);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 10px;
        }

        header { text-align: center; margin-bottom: 40px; width: 100%; max-width: 800px; }
        h1 { font-size: 3.5rem; font-weight: 700; margin-bottom: 10px; text-shadow: 0 4px 8px rgba(0,0,0,0.3); letter-spacing: -2px; }
        .subtitle { font-size: 1.3rem; opacity: 0.95; }
        
        .container {
            width: 100%;
            max-width: 720px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 30px 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }
        
        .buttons-container { display: flex; flex-direction: column; gap: 16px; }

        /* The Button Base */
        .button-wrapper {
            position: relative;
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
            border: 2px solid var(--royal-blue-dark);
            background-color: var(--royal-blue);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.25);
        }

        .main-btn, .sub-link {
            display: block;
            width: 100%;
            padding: 22px 28px;
            color: white;
            font-size: 1.35rem;
            font-weight: 600;
            text-align: left;
            text-decoration: none;
            cursor: pointer;
            transition: background 0.2s;
            border: none;
            background: none;
            font-family: inherit;
        }

        .main-btn:hover, .sub-link:hover { background-color: rgba(255,255,255,0.1); }

        /* Multi-Link Layout */
        .sub-links-container {
            display: none; /* Hidden by default */
            flex-direction: row; /* Horizontal split */
            background: var(--royal-blue-dark);
        }

        .sub-link {
            flex: 1;
            font-size: 1rem;
            padding: 15px 10px;
            text-align: center;
            border-right: 1px solid rgba(255,255,255,0.1);
        }

        .sub-link:last-child { border-right: none; }

        /* Toggle State */
        .button-wrapper.active .main-btn { display: none; }
        .button-wrapper.active .sub-links-container { display: flex; }

        /* Indicator for multi-links */
        .has-sub::after { content: ' ▾'; opacity: 0.6; }

        .loading { text-align: center; padding: 40px; font-size: 1.2rem; }
    </style>
</head>
<body>
    <header>
        <h1>Homepage</h1>
        <p class="subtitle">Quick Links Directory</p>
    </header>
    
    <div class="container">
        <div id="buttons-container" class="buttons-container"></div>
        <div id="loading" class="loading">Loading directories...</div>
    </div>

    <script>
        async function loadDirectories() {
            const container = document.getElementById('buttons-container');
            const loading = document.getElementById('loading');
            
            try {
                const response = await fetch('directories.json');
                const directories = await response.json();
                
                loading.style.display = 'none';
                container.innerHTML = '';
                
                directories.forEach(([title, data]) => {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'button-wrapper';

                    if (typeof data === 'string') {
                        // Regular Single Link
                        const link = document.createElement('a');
                        link.href = data;
                        link.className = 'main-btn';
                        link.textContent = title;
                        link.target = '_blank';
                        wrapper.appendChild(link);
                    } else {
                        // Multi-Link Logic
                        const mainBtn = document.createElement('button');
                        mainBtn.className = 'main-btn has-sub';
                        mainBtn.textContent = title;
                        
                        const subContainer = document.createElement('div');
                        subContainer.className = 'sub-links-container';

                        // Create sub-buttons from the object
                        Object.entries(data).forEach(([subTitle, url]) => {
                            const subLink = document.createElement('a');
                            subLink.href = url;
                            subLink.className = 'sub-link';
                            subLink.textContent = subTitle;
                            subLink.target = '_blank';
                            subContainer.appendChild(subLink);
                        });

                        mainBtn.onclick = () => wrapper.classList.add('active');
                        
                        wrapper.appendChild(mainBtn);
                        wrapper.appendChild(subContainer);
                    }
                    
                    container.appendChild(wrapper);
                });
            } catch (error) {
                loading.innerHTML = `<strong>Error loading configuration.</strong>`;
            }
        }
        
        window.addEventListener('load', loadDirectories);
    </script>
</body>
</html>
